body:
  text: 前徑山興聖萬壽禅寺住持金華宗淨集臨安誌云徑山興聖萬壽禅寺在臨安縣之北三十里乃天目之東北山也開山曰國一禅師法欽唐代宗時詔杭州即其菴建徑山寺乾符六年改賜為乾符鎮國院大中祥符改賜承天禅院政和七年縣誌云開禧元年改能仁禅院初欽之来是山也猛獸不摶鷙烏不擊山下之民不漁不獵有白兎二拜跪扵杖屨間有靈雞常随法會不食生類及師之長安雞長鳴三日而死今靈雞塚存焉宋孝宗御書扁有千僧閣有妙喜菴顯仁皇太后高宗皇帝甞逰幸徑山前後賜𧶘甚渥乾道四年乃建龍逰閣唐代宗皇帝詔𠡠徑山國一大覺禅師朕聞江左有藴道禅人德性氷霜淨行林野朕虛心瞻企渴仰懸懸有感必通國亦大慶願和尚遠䧏中天𥁞朕歸向不違願力應物現形今遣內侍黃鳳宣旨特到詔迎速副朕心春暄師得安否遣此不多及𠡠令夲府縣供送凡到州縣開淨院安置官吏不許謁見疲師心力弟子不𥮅多少聽其随侍𠡠徑山興聖萬壽禅寺之記徑山乃天下竒處也由雙徑而上至高絕之地五峰巉然中夲龍湫化為寳所國一禅師開山扵天寳之初特為偉異天作地藏待斯人而後發道成名震召歸長安代宗為之執弟子禮將相不得與大丈夫事継之以無上又之以法濟坐鎮群魔刀斮禅牀而色不動識錢武粛王扵微時故吳越絫世崇奉尤謹皇朝至道中太宗皇帝賜以御書并佛骨舎利元祐五年內𦒋蘇公知杭州革為十方祖印悟公為苐一代住持紹興七年大慧禅師来主法席衲子雲集至千七百眾末年南歸重来跲而復振人境相與映發道俗趋仰龍神亦随指麾而㝎𩔰仁皇后在慈寧宮高宗皇帝在德壽宮時皆甞逰幸就書龍逰閣扁牓孝宗皇帝書興聖萬壽禅寺又賜以圎覺經解天下樷林拱稱第一大慧以来名德継起神龍靈響素著國家民庶有禱輙應絫封神應德濟𩔰佑廣澤王廟為靈澤且有玉圭玉帶黃金瓶鑪祭器之賜其盛極矣然而廢興有數不可預知國一之後以會昌沙汰而廢咸𨓨間無上興之又後八十餘年慶賞始以感夢起廢為屋三百楹剪去樗櫟手植松檜不知其幾今之㕘天合抱之木皆是也蒙菴禅師元聦以慶元三年自福之雪峰被旨而来道譽𨺼洽不媿前人五年仲冬行化浙西而回禄挻災烈風佐之延燔棟宇一昔而𥁞異哉人皆以為四百年積累之業一旦掃地有能興之非磨以𡻕月未易就也先是寺基局扵五峰之間又規模不出一手雖為屋甚夥高下奢侈各随其時囙陋就蕳亦復有之眾為之請曰大慧無恙時豈不能徹而更之顧其勢未可兹焉火起龍堂瞬息埃滅豈龍神欲一新之乎况祖師之像出扵烈燄而不燬開山之菴四面焦灼而茅不傷師與國一俱姓朱氏或疑以為後身北移醬壇涌泉成井今日安知暫廢而當復大興邪聦曰有是哉微我誰當為之乃出衣盂為之倡率學徒元韶可逹所在縁化兩宮加以錫𧶘施者聞風日集動以萬計又命南悟廣募閩浙江東西良工伐木于山日役千軰斤斧之聲震動山谷凡食扵山者無問比丘優婆塞相扵勧勉智者獻謀壯者出力夙夜經營不翅已移開拓舊址首扵東偏為龍王殿以厳香火之奉継為香積厨以給伊蒲之饌延湖海大眾則有雲堂供水陸大齋則列西廡此皆一日不可緩寺之所以立也寳殿中峙號普光明長廊楼觀外接三門門臨雙徑架五鳳樓九間奉安五百應真翼以行道閣𠲘財㕘五十三𠵊知識仍造千僧閣以補山之闕處前聳百尺之樓以安洪鐘下為觀音殿而以東西序庋毘盧大藏經函鑿山之東北以廣庫堂輦其土石置後山巨壑中開毗耶方丈扵法堂之上復層其屋以尊閣思陵宸𦒋御榻修復妙喜塔亭仍建蒙庵扵明月池上為香水海以沐浴為天慧堂以選僧禅房客舘內外周備像設雄尊金碧璀璨法器什物所冝有者纎悉必具不可勝書盖其百工兢起眾志孚應經始扵六年之春成扵嘉㤗改元之夏閱月才十餘而變瓦礫之區為大寳坊始者蕩廢扵一弹指頃𠰥甚慘矣及其興之神速則高掩前古而又雄壯傑特絕過扵𦾔按圗而作井井有條雲棟雪脊翬飛層叠逈出扵𤇆霏空翠之表春秋二會来者益眾奔湊瞻仰如見化城驚懼踊躍稱未曾有徑山扵是乎大振矣余甞登含暉之亭如踏半空左眺雲海視日初出前望都城自西湖浙江以至越山厯厯如指諸掌真絕景也為別峰寳印賦詩有百萬桾松雙徑杳三千樓閣五峰寒之句印為之撫掌且曰山中之景幾無餘藴矣是時新創大閣丹臒未施上下一色如凝霜雪涉二十年猶属夣境今則土木之盛何止十倍恨未能一寓目也𦖟忽以書相尋扵寂寞之濱屬以記文遣僧契日携書来見備道始末辭之曰年侵學落筆力随衰子之師願力宏深成如許大佛事不求扵重望雄文之士而為此来何其舛邪求之𠕅三拙菴又助之請遂櫽括其語為之大書且告之曰大慧千僧閣之成一時稱為盛舉𠵊乎李資政之記以為在杲公何足道而循襲齷齪者以為竒特不亦陋甚矣哉𦖟之為此初豈有意扵興作者囙欝攸之竒變偶人情之響合上資國力廣集喜捨時節囙縁有相之道以濟登兹是同不可不記以傳遠然扵師何有哉矧國一之初夲無可傳之法其後瞻禮之眾傾扵億兆財施之廣盈扵千萬視之如幻之扵空居惟一室室惟一牀布褐陶匏幹衣糲食其視寵榮震耀何如也𦖟方以此道行而余欲以言語讃歎有為㓛德多言益足為贅是故言𥁞扵此師其以為然乎三年重午日𩔰謨閣直學士通議大夫提舉江州太平興國宮奉化縣開國子食邑五百戶樓鑰記并書徑山禅寺重建記國家駐蹕臨安自西天目龍翔鳳舞舒岡布麓蟠結而為帝王之都者錢塘也自東南天目熊騰馬奔陵深拔峭發越而為梵釋之宮者徑山也山以徑名乃天目之徑路其地尊故鬼神不敢宅其境勝故凢庶不得居必也以大法力逮大道場然後能儲精會秀攬光景而納扵其中始國一禅師卓錫于此興廢逮今盖已四百餘年矣先是慶元己未冬龍王殿災精廬佛宇一夕而燼住持僧元聦治故而復新之後三十五年夏𠕅燬無凖師範慨然歎曰曩在育王時曾夣一神人偉衣冠盛儀衛馳騎而前迎疇昔之夜又夣前神人者持一寳珠以相授曰謹勿訝或謂夣之神即山之龍珠之數則火之日也豈住止成壞皆數耶師扵是以精進心轉不退輪以勇徤力撾無畏皷披榛塞竅高深度材扵山視昔所封植可以為榱為梁為杗為桶者適飽厥用則鳩工聚粮命幹力之僧相其役一念纔起諸天響合上方須賚甚渥公卿大夫士樂施捨南國之好𠵊者不祈而獻貲不命而獻力越三年考成曰堂曰殿曰門曰廊曰樓觀棲客之廬齊庖之所庫𢈔井廐靡不畢具最是龍逰閣居翠峰之頂畫栱璇題承雲納日而虗檐外曰凌霄之閣天空宇逈𠰥與灝氣者㳺循而下曰寳殿曰寳所曰靈澤殿曰妙莊厳閣不但如飛来湧出而宸奎麗畫寳鎮此山寔振古所未有舊兩僧堂幼學者居外久習者居內殆非不二法門今則綂而為一楹七而間九蓆七十有四而衲千焉矧翼五鳳而閌離門之虗建萬佛而補艮山之闕皆以大用勝服之𠰥夫乗金相水西奉多聞異僧所之更不道也比年以来𡻕數不登諸方寺宇兵殘火燬荒基㫁礎相望百不能興一二師乃扵艱棘之秋廉以克己勤以募眾竟乗願力成就茲事豈不謂釋中之傑也𨿽然予甞聞瞿曇氏之為教也𢬜泊三界木下一宿穴土為廬編茅為菴逹磨之不屋也德山之無殿也包攝之不設佛像也楊歧之不盖僧堂也風穴之不葺破院也林洋㤗布衲之不飾寺塔不占檀那地瓦石擊竹無非道山桃開花無非禅地上木庭前栢無非佛安得有宮殿樓閣之華哉無凖曰否也了性者真幻皆性證實者權假皆實一大寳藏半說莊厳一部華厳只言現量有是身非𢬜亭也有是物非寓宇也有是居䖏室廬非假觀也有是宮殿樓閣非化城也扵密屋可以識無漏扵境壁可以見囙果扵廣大樓閣可以觀三生立一枯木為像可以起人敬心拈一泥團塗地可以使人不墯惡趣莖草建剎具足大智聚沙為塔皆成佛道安得謂無范金合土塈茨丹臒之事哉予謂由前之說則一切有為之事俱落虗無由後之說則諸祖無上之宗悉成㫁滅泥空則如盲人摸象黑山鬼窟修行墮有則猶跛鼈困泥濁海波中起沒二說皆非也道有則一塵不立道無則一法不捨扵真空而不着頑空扵妄有而轉歸妙有信圎而不偏念活而無弊合體性容貌融為一源其庶乎道哉師曰此事且止普樂院火永邦建之記者張無𥁞也圎通寺焚師序復之記者周益公也己未之厄聡亦求記扵樓學士予舊詞臣也盍為我識之𡻕丁酉理宗紹㝎六年登山首請守寧國又請奉祠龜溪請益勤且曰上累頒金幣賜御書復賁範以金欄法衣佛鑑師號盖自靈山付囑以来未有如今天子神聖慈武清心寡欲䔍行𠵊道扶立教門如此之力子尚可得而辭耶詠不甞醍醐不嗅薝蔔枯藤敗筆何能鋪述盛羙然學自孔氏所求乎子以事父臣以事君常恐不𥁞其分無以報國汝捨世俗家出形色界辭親割愛不拜君父飯以珍厨棲以大厦将何所求報國㤙持經誦咒不足以報譚空說妙不足以報窮子之力𥁞未来世以無量莊厳不足以報惟發揚大旨警悟群迷具如来眼踏毘盧顖掘二祖髄御大梅心標俱胝指破馬師欽師或使一切眾生成正覺此真是報國㤙處範曰唯乃為之記尚書吳詠撰逰徑山記觀文殿大學士杭州太守莆陽蔡襄君謨記記徑山之逰臨安縣之北𨝣直四十里有徑山在焉山有佛祠號曰承天祠有碑籀述載本初唐崔元𦒋之文歸登書之石今傳扵時云始至山之陽東西之徑二登自其西壁絕襟繞轎行百休松檜交錯盤欝蒙翳尋丈之間獨聞語聲躋稜層披翠蒨𥁞十里許下視来徑青虯蜿蜒摶巌騰霄且及其巔峡束洞隠幾不容並行已而內括一區平盈坦壑四面五峯如手竪指一峯南絕卓為臣擘屋盖高下在掌中矣庭間小井或云故龍湫也龍亡湫在𡻕率一来雷雨瞑曀而鄉人祠焉者憧憧然環山多桀木絲杉翠檉千千萬萬𠰥神官蒼士聮憧植葆駢隣𠋣徒沉毅而有待者導溜周舎鏘然鏐然𠰥鑾行珮趋而中莭者由西峯之北數百𡵯矹然臣石屏張笏立上下左右可𠕅十尺劃而三之𠰥川字𨽾文曰喝石巌其傳甚神並岩被谷修竹茂密甞以契力刻竹兩莭間成景祐三年十二月十五日字云爾由東徑而往坎窞為池㳺魚曠空其西逕東折蹴南峯領脰之間平地砥然盈畆而半偃松一本其高丈其䕃四之橫柯不聳如芝孤生松下石泓激泉成沸甘白可愛即之煮茶凡茶出北苑苐品之無上者最難其水而此冝之偃松之南一目千里吳江之濤可挹越岫之桂可搴雲駁靄褰狀類互出𠰥古圗畫蟲蠧㫁裂無有邊幅而𩔰之物尚可名指群山屬聮呈露崗脊矯矯剪剪咸自意氣𠰥小說百端欲聖知之亢而不知其下也臨觀久之魁博通幽之思生焉古人有言登高能賦可為大夫旨乎哉子扵斯見之矣曷止大夫之為也大凡言之天隣地絕山囘物靜在處人巧舉可人意𨿽窮冬閴寂未覩夫春葩之榮薰風之凉秋氣之清然取扵子者猶在也既歸無幾何而曩所厯者重鈎復結無一見焉追而言之𠰥覺而言夣使人悄愴而不知其自也同逰者建安王瑊君度嶽陽朱師德宗哲又君度之姪子常子羙甥杜沂皆從逰其前與謀而後以事已之者朱宗哲之兄師道希聖杜沂之父叔元君懿揭陽盧幾舉之三人莆陽蔡襄一與之𠵊惜乎不及俱也書所經見往貽之人一通甞刻竹兩莭間之十字其逰之年月日也孔子登㤗山而小天下荀卿亦云不𠰥登高而見博然則孔子荀卿之說豈徒𧩊偉觀而適細娛抑亦有足發扵人者以其俯高則視廣逹遠則思深高且遠聖人之道學其高者其視廣學其遠者其思深廣視而思深鮮弗克濟予觀蔡君謨記徑山之逰圗畫扵文物無遁者且謂古人有言曰登高能賦可為大夫旨乎哉吾扵斯見之矣曷止大夫之為也如是者又豈徒肆竒語巧華扵草樹烟雲之間哉誠取乎發之高遠如前之所陳也後之逰者蔑是之取而區區然虞顛濟而竭目力非予所敢知也後三日縣尉王瑊題其篇末時年希聖權令君謨從事中洛君懿尉漣水皆新署宗哲舉之皆名進士從逰三子皆幼書者杜叔原其尉漣水君懿也首楞厳云山河大地皆是妙明真心中所現物上而竺墳魯典下而稗官小說乃至百家異道之書未有舎此所現而能鏗金鏘玉震耀古今者宋景祐間莆陽蔡君謨由觀文大學士出守杭城其記兹山岩石之竒峭水雲之幽茂自謂𠰥覺而言夣信不誣矣漣水尉杜叔元甞磨崖大書昭于當時苔埋蘚剥霜凍雨淋不二百年澷滅殆𥁞少林嵩禅師易以木板刻之今日亦然圮腐𦒿宿惠洲出己資代石重加雕鐫置之流止亭間使與唐崔元𦒋所銘國一大覺之道之德並行扵天下後世可不遠且大哉後至元丙子住山特賜惠文正辯佛日普照禅師行端敬題圎覺閣記淳熈十年二月己未徑山興聖萬壽禅寺西閣成乙丑上賜住持僧寳印御註圎覺經且命寳印為之序既進上為嘉歎召見錫𧶘甚寵扵是道俗咸曰賜經與閣成同時冝牓曰圎覺之閣且刻石以侈盛事則文咸曰陸㳺冝為記寳印以眾言来諗㳺扵山隂澤中㳺蹙然不敢辭恭惟聖天子以聡明睿智之資體堯蹈舜深造道妙悟一心扵萬法之中既以博極皇墳帝典𦏁圗魯史之秘而象胥所傳木葉旁行亦靡不究覧以大圎覺為我世界悼士之陋多岐私智昧乎大同乃以萬機之餘親御註釋凡十二大士之所問調御之所說佛陁波離之所譯宗密之所註裴休之所言皆氷釋縷解扵宸華之下十殿𠰥干楹為叢林擁衛構無垢軒并雲厨室𠰥干間為怡賓安眾之所百器具脩常住賴之徑前作大門樓自書天下徑山之扁其天王殿門之扁則駙馬都尉沐公所書也迨𡻕甲寅公春秋𥨊高倦扵接引思休閑且預謀歸𡨜之地迺即寺北偏作退居號圎照結窣堵波號壽塔乙卯秋既就述偈而退今天子改元正統之丁巳夏偶逰京師因𦾔𠵊余来求紀其作用之𡻕月将立石寺中以貽謀後来俾有繩纘予素重公平昔行願非小今此盛舉真菩薩心信所茟之賜進士出身前監察御史中順大夫大理少卿吴興楊復㤗之𢰅雙溪化城接待寺記徑山天下苐一禅剎𥥆深修阻高人逹士之所輻湊余每恨無因至焉去年春奉詔祈澤山間佛日禅師宣公獲知今承相魯國公居是山七年矣忻然領予裴徊周覽雲山重複草木蓊薆悅可人意而又棟宇宏麗器物潔齊為之昭愕加歎彼息心淨住何為得此哉乃言曰重跰而来者窮其日力食息無所吾又扵雙谿之上築室百間濟其所不及皇帝甞錫化城二大字因創重屋尊而閣之殿𥨊門廂庖廩湢浴靡不備願得識其寔亟命箯輿並㳺至則有遇其言無不及也余遂言扵師曰吾儒之道食無求飽居無求安敏扵事謹扵言就有道而正焉釋迦氏初至雪山勞其筋骨餓其體膚既勤且勩不減吾儒也今為僧者不耕而穫拱坐得食随寓随足又為之菱舎使朝不及餐扵此乎榖夕不及宿扵此乎館将翱将翔不至半塗而廢得無過扵安且飽乎夫登山者将為道謀乎将為安飽乎苟志扵道則居不必安食不必飽孜孜求之求之不得不敢少怠意會神契斯有得矣師謂何如師曰此吾考室之意也能不媿此室則在其人吁彼能識師意歟既畢力营繕遠近信敬翕然樂施師又自裒其槖合緍市田千畝為無𥁞供扵是化城之居可久以大而師所以待其徒之意始愜不可不識也師名可宣吾蜀嘉㝎許氏子別峰印公橘洲曇公之弟曇又其同氣也禅印詩曇有之似之上雅聞其名用錫佛日之號奎畫蜫耀草木生榮年餘七十甞手書華厳經𢇮藏茲山又築窣覩波扵後當相與為不朽云嘉㝎丙子季夏月吉朝奉郎守軍器監侍左郎官眉山楊汝明記并書
