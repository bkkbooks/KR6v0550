front:
  text: 徑山集三卷明刊本揚州馬氏藏書前徑山興聖萬壽禪寺住持金華宗淨集徑山在臨安縣天目山東北唐國一禪師法欽始開山代宗詔建寺乾符宋大中祥符政和疊改寺額南渡後顯仁太后高宗嘗遊幸賜賚孝宗御書千僧閣妙喜菴扁額是集上卷記寺之建置中卷記禪宗下卷載藝文萬曆丙子僧方壹有序又後識曰本山正璠呆庵十一世孫也緣覩是集殘毀将泯惜無以聞見後賢率徒性澄等回施衣資謹刻流通所冀閱者不動脚頭已覧一山三石怪未譚舌底早知雙徑五峰寒悟是相非相即如來清淨法身斯觀不觀證當入游戲三昧云云卷冊面有長方木記朱印乾隆三十八年四月兩淮塩政李質穎送到馬裕家藏釋宗淨徑山集壹部計書壹本卷首鈐翰林院印葢四庫後返還本子徑山集徑山集三卷明釋宗净集明萬曆七年刻本釋宗净金華人為徑山興聖萬壽禪寺住持徑山在浙江余杭縣城西北二十五公里為天目山東北峰因山有長五公里許的東西二徑盤折上達天目山而名唐玄宗天寶年間清欽禪師於此開山建庵代宗禮為國師詔賜徑山國一大覺禪師並詔於其庵建徑山寺僖宗乾符六年改名乾符鎮國院宋真宗大中祥符中改賜承天禪院徽宗政和七年改能仁禪院後更名興聖萬壽禪寺今寺已廢本志專記徑山寺事實為徑山寺志卷上載徑山寺記徑山寺重建記及游徑山記圓覺閣記等文卷中載徑山寺歷代住持生平行業卷下載歷代詩文曾學文重刻徑山集序凡集之歆慕扵當時而傳於不朽者非以其迹㕥其实也跡無實罔㕥徴实無迹終莫能廢故古之聖所遺之墳索詩書易春秋禮樂以至百家子史籍皆燦然千古猶一日也何哉以其有實之可以𡸁教萬世而為法扵天下耳我宗門自竺乾七佛迨於六祖以及千七百家咸有經論萹章敷宣無量妙義㕥顯示真宗故自周抵今之喆聖明王公卿大夫士徃徃尊崇之不替而与孔孟之道偕存者蓋亦以其实之有在也徑山名列天下道塲之首豈以山盤踞之奧勝與遺蹟之繁夥也邪寔由扵唐之開山國一欽公与無上宗公灋濟諲公之廿數皆以性地朗徹法境晶瑩其衜足以當代宗皇帝之諸聖眷佇欽承歷朝之羣公企仰禮下而可垂教為法扵後耳暨是涉五代屆趙宋而大慧杲公者相繼輩出又且二三十許貟皆雷轟電掣獅吼象驟誠謂古佛現真宗迭顯在也故宋帝孝宗屢賜璽翰及御製真讃以嘉𧶘之鉅公如魏國張浚丞相張商英侍郎張九成之諸賢逹者前後相𠫵叩承事而弗斁抑又豈非以其實之所召與是故道塲居稱天下苐一固無忝扵徑山矣𣣔攷見已上諸家之實其玄猷玅旨備載五燈会元條然可討攟摭浩繁兹弗克悉綴至𣣔求訪徃古事跡則必身臨于境自可槩得耳以跡以實惟世之君子配之焉是集舊有刻本厯年滋久書亡板廢有日矣今季首春寺主僧嘗董治樓殿諸冗事者正璠也慮其愈久而愈失之荐至無所從考也乃搜厥殘冊㫁編聚鉢資倩工依抄本重繕刻之以聊存其故住持自唐國一祖師至此共凢八十代梓既訖持一本示余請以序弁諸端余即展以閱之見其中間魯魚亥豕者屢出余頋謂之曰曷為若是璠曰板失罔所㨿證之也又祖上之遺籍後人莫敢妄為之臧否耳姑從其敝為是余遂廼弗再詰而撮其畧与為之序至傳互之故盖白璧蠅玷也從來既遠咎靡所質矣幸大方觀者抉其梗概而遺其譌繆付之以囅然一咲云爾萬曆四年丙子夏四月吉𢆱住徑隝硯山跛老方壹撰并書
