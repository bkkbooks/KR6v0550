body:
  text: 前徑山興聖萬壽禪寺住持金華宗淨集題徑山大覺禪影堂張祐超然彼岸人一徑謝微塵見相即非相觀身豈是身空門性未滅舊里化猶新謾指空中影誰言影似真寄澄慧大師眉山蘇軾我昔曾為徑山客至今詩筆餘山色師住此山三十年妙語應須得山骨溪城六月水雲蒸飛蚊猛捷如飛鷹羡師方丈氷雪泠蘭膏不動長明燈山中故人知我至爭來問訊今何似為言百事不如人兩眼尚能看細字逰徑山寺衆𡶶來自天目山勢𠰥駿馬奔平川中途勒破千里足金鞍玉鐙相回旋人言山住水亦住下有萬古蛟龍淵道人天眼識五氣結茅宴坐荒山巔精誠貫山石為裂天女下試顏如蓮寒窗暖足來朴楃夜鉢咒水降蜿蜒雪眉老人來扣門願為弟子長參禪邇來廢興三百載奔走吳會輸金錢飛樓湧殿壓山破朝鍾暮鼓驚龍眠晴空偶見浮海蜃落日下數投村鳶有生共處覆載內擾擾膏火同烹煎近來愈覺世路隘每到𡩖處𠰥安便嗟豫老矣百事廢卻尋舊學心芒然問龍乞水歸洗眼欲看細字銷殘年再逰徑山寺老人登山汗如濯到山困睡呼不覺覺來五鼓日三竿始信孤雲天一握平生未省步難險兩足貫曾行犖確含暉亭上望滄溟凌霄𡶶頭抱南嶽自愛絲杉青絲亂誰見玉芝紅玉琢白雲何事任來往明月長懸無晦朔冢上雞鳴猶憶欽山前舞鳳遙徴璞雪窗馴兔元不死煙嶺孤猿苦難捉從來白足傲死生不怕黃巾把刀槊榻上雙痕凛然在劒頭一吷誰能角嗟我昏頑晚聞道與世齟齬空多學靈水先除眼界花清詩為洗心源濁騷人屢欲遙競病禪老但喜聞剝啄此生更得幾回來從今有暇無辭數凌霄菴石湖范至能𡶶頭非塵寰一舍誰所茇軒眉玉霄近挼指沙界豁萬山紛纍塊衆水渺聚沫來雲觸石廽去鳥墯煙波向無超俗緣茲路詎可越偕行木上座同我證解脫傾蓋亭萬山離立翠雲幢嫋嫋移聞晚炊香山下行人塵撲面誰知世界有清涼題徑山寺樓落日蒼范水捫星縹眇樓神光來燭夜壽木不知秋海內五𡶶秀天涯雙徑遊愛山吾欲住哀病𡞸乘流題徑山寺釋仲靈嵩翠拔群山外連天勢未休雲迷飛烏道兩出古龍湫僧在深雲㝎香和杳靄浮人間逰不到一殿自清秋哭徑山塗毒禪師陸放翁務觀岌岌龍門萬衲傾翩翩隻履又西行塵侵白拂繩牀泠露滴音松卵塔成遙想再來非四入尚應相見話三生放翁夙欠修行力未免人間愴別情送僧上徑山東妙喜老子釋空東山大士昨來聞出世阿師今日又登途杖頭倘有開田地寄我山頭一紙書半幅全封一字無莫嫌者也及之乎還將昔日芭蕉語寫作王公十道符徑山天開圗畫釋肇淮海幽澗瀉泠泠千𡶶疊翠屏曉雲開混沌遠水接滄溟松影捶禪榻苔衣上淨瓶塵中夢不到爭欲買丹青徑山冬日東西兩徑幽歲晚得周遊壑雪隂存在溪雲涷不浮鳥驚樵斧重猿挂樹枝柔怕有梅花發因行到水頭徑山寺三題喝石巖菖蒲田樹王皓首來迎宴坐師山靈易地致俱胝要知弘法回天力但看精誠裂石時一徑蘚苔春寂寞斷崖文字雨淋漓徘徊想象登雲𠁅風撼松杉萬𡎙悲一從神武挂𠜍纓便入千𡶶適性情已向耆英逃姓字肯因楊柳作歌行石田水冷菖蒲莭茅屋雲深薜荔榮白髮山僧知此意時時來聽野泉聲翠絲縝密赤心存膚奏陵風溜雨皴直莭向時曾遇上微荄率土莫非臣輪囷古柏空生蜀偃蹇寒松柏仕秦瀑布青山堪帶礪森森同見萬年春上浙翁和尚凌霄峰頂極高寒中有高人把釣竿萬里江湖未歸客滿天風雨獨憑欄醫和世遇肱三折慈氏門開指一彈管領梅花春有意免教回首望長安送見心上人之徑山虞伯生集臺山驀直勿歧差雙徑𡶶前路不賖𠰥有劒光衝北斗更愁帆影落誰家曲江水暖花千樹古道秋高月一槎記取題詩相送𠁅鷺鷥和雪立蘆花題徑山二首釋端元叟昔人弘法動天庭此地因𡸁万古名龍抱雨雲歸洞府𩿾摶山島壯江城先秋每覺岩風泠未曉常觀海日明玉局詩鐫舊貞石至今苔蘚不曾生曲曲灣灣水重重疊疊山水流雙徑畔山在半天間九夏涼偏甚三春暖尚慳龍潭因作寺今古共躋攀送愠藏主省徑山元叟和尚釋砥平石山頭老漢八十一如此東南大法城雙鬢又添新歲白片言能使古風清為人不用擊虎術養子寧忘舐犢情明月堂前坐深夜餘光分得到長𢈏次韻象原懷徑山釋仁行中蒼蒼喬木五𡶶齊十載江湖憶舊棲丘𡎙芝蘭香霧上金銀樓閣彩雲低秋風悵望遼天鶴夜雨悲源冢上雞但得間身各安健會尋石壁灑新題曉晴流止亭看山下眠雲釋泐季潭非煙非霧曉濛濛萬象都歸一氣中深似海時初歇雨白于綿𠁅不隨風得間漸有還山意偃卧寧無澤物㓛亭際老僧來倚檻只疑下界頓成空宿徑山娑羅林二首釋銘古𣇓高齋宿層巒無眠振衣起歷歷夜方峭婉婉情自美濃露濯桂花清香襲庭几林曠鳴籟空淨停雲徙萬事坐𠰥遺靜極到天理舉目注秋江涼月薄如水間宵散積抱淡然得心妙蛩泠暗響流燈靜寒光掉星河纍明滅崖溜落淵奧林風來朋朋吹我形影吊浩歌弄夢月高樓入清照堆珠𡶶一名鉢盂𡶶天勢下凌霄坐使萬𡎙趨元氣結巒岫狀此大寶珠忍殿護釋𣑽鼓鍾殷入區大人𡶶一名天顯𡶶五髻上雲雨鎮踞何春容具此大人相題為大人𡶶偉哉天地間萬象同擴充𩿾搏𡶶𡶶勢來大𩿾鼓此𡸁天翼培風夲無待適兹造化力何須問天池在在六月息宴坐𡶶杉松太古色不例春與冬道人此宴坐一念萬劫融不特座燈五等了諸法空朝陽𡶶二儀開幽漠日月臨下土萬物麗高明此𡶶正當午堂堂大坐人兩眼空寰宇山中五𡶶傳之久矣然指者不一今訂其是去其非因各賦一詩庶來者不待問而知也時至正𢈏寅十月徑山祖銘書寄徑山古𣇓和尚歐陽圭齋上人能舉龍文𣇓坐斷凌霄苐一關湖上別來圎鏡話相應照我鬢毛班圭齋以福建𤎉使任滿赴召過杭訪古𣇓于中竺臨別古𣇓送至西湖之上圭齋云此別未卜會期古𣇓云大圎鏡中未嘗與公相別也圭齋喜無何古𣇓遷徑山圭齋故寄以偈次韻寄徑山以中和尚釋聲九臯山川樓觀總丘墟雙徑還成化佛居四海重修輿地志群龍仍護𣑽天書野猿俱茟詩成後玉女焚香㝎起餘大覺昔成天子詔解知山體夲如如東南地上絶尊榮國一重來更有情一院秋風蘆蔔老滿山風雨苾芻生他方弟子來傳法上國公卿𥁞慕名繞繞花雲圍晏坐豫生自愧老于行次韻賀象原禪師遷徑塢釋及以中萬仞龍門奏凱歸山頭魚躍井塵飛生機透脫空諸有妙用縱橫顯衆微四海叢林師望重三台人物曉星稀祖翁塔所能延老擬辦遮寒布衲衣月江和尚壽象讃雲曇讃神㝎氣沖言雄貌偉擊拂一下大海絶流咳唾一聲須彌粉碎衲子師模佛祖骨髓文淵閣下道動天顏喝石巖前名尊地位夫是之謂正菴和尚之的傳妙喜七葉之華裔也琇公禪師新命住持徑山禪寺無以為贈故賦是詩以駕之情見乎辭也少師姚廣孝徑山主帝非公誰山靈但恨公來遲今年中旺氣回公忽自至逢其時凌霄𡶶頭日杲杲喝石岩畔風披披升堂提唱苐一義緇白圍繞如春熙當年國一心為喜冝與諸老相追隨諸天散花無路入老龍獻供伸須眉碁盤石剝舊苔蘚洗硯池發清漣漪僧殘屋老固非昔入門尚見窮然碑坐看檀越施金粟飛樓湧殿重維持嗟余老病不出戶終日兀坐如蹲鴟安得乘雲到山頂援茟載和蘇公詩長偈一首送印無相還徑山重蓋國一祖師塔院蕳海印老叔和尚一笑釋泐季潭來無所從信腳踏斷槎丫𡶶去無所至一口吸𥁞龍淵水不來不去又如何機先勘破迦葉波須彌卓海水立木童拍石女歌道人夲來無所住一種平懷仍舊去喝石巖前架樓閣井底蓬塵話重舉有為法與無為法體用全彰無不別國一高風天下聞徑塢禪叢𠜍吳越昔我𡶶頭繼席時忍見祖塔何歌危道人不日還舊觀森羅萬象同掀眉方丈老人今碩匠雲月溪山遠相望不學江西馬𥳽箕千里令人寄圎相寄徑山南石禪師徑塢荒涼正下秋老師砥住兀中流一新門戶龍神喜何事忽忽即退休竹箆放下便抽身妙喜菴頭去結鄰山上鯉魚打𨁝跳誰知井底輥蓬塵凌霄退席鼓三撾去住渾同眼底花何日到京重敘舊殷勤意不在香茶送月江淨禪師住持徑山序自古沙門雖息欲歸于無為而好與賢士大夫遊何也蓋其人乃世之頴敏慤願者假浮屠之形以為高託文章之流以為勝如道安于鑿齒慧遠于元亮道林于居易文暢于退之宗元彼尊竺土之法此服先王之教二者冝其不相為侔然常與其進而不追其往豈非以彼墨名而儒行哉月江淨禪師頎身偉貌德夲宿植覺由性稟以真乘法印參儒典並用默而能融辨而不肆所著詩文皆有足觀尤以接物利生為己任總司聞其賢公舉授徑山住持夫徑山天下首剎唐代宗朝國一欽禪師為開山苐一祖得其傳為大慧杲杲傳佛照光光傳妙𡶶善善傳藏叟珍珍傳元叟端端傳靈幻明明傳正菴誾淨師乃正菴法子也往時𦒋林侍講王公時彥在祕閣纂修少師姚公實總其事二公論及東南名僧淨師亦居其一師推悟理而信故于孔氏之學習而不懈釋氏之教行而不怠雖小戒律如踐青折萌盥手泛席之數未嘗放心是固異夫縱誕譎亂假託之所為者焉觀少師姚公所撰重修記春坊大學士曾公靈徴記則淨師之歷職㓛行賢士大夫之敬禮推許徙可見矣況徑山與竺乾鷲嶺𣇓峙角立淨師又得正菴嫡傳方今朝廷清明裒崇釋道而淨師躡空驅錫舍筏振塵于五髻凌霄之間説法度人脫去穢纍行道化凡超詣覺路與起少林妙喜之家世以檀重于十載之後此香火緣也豫雖非退之宗元文章之流可以增高益勝然有鄉曲難忘之情故其行樂為致辭以告于慕道風重文雅好事者云洪熙元年乙巳春三月十有七日丁亥國子司業金華貝秦書月江和尚升住徑山京都宗剎疏四明溥洽國朝新開泰運佛法重光教省載整宗綱師承唯謹矧徑塢為五山之首而掄村得萬指之雄操勵修能賁光嚴席徑山堂上月江和尚質貌魁特襟度豁如證果初登借我邦人作善知識泠泉分座人天眼目表率叢林早承天詔寵榮獨運霜毫透發蘸乾太液池水現出優曇鉢華既不動舌轉大法輪乃出無心感多靈瑞疇咨極品旌貴竒才妙喜法道再𨺼寂照家聲不墜登凌霄挹鷲嶺瞻光彩于父子之間敷至賾演乘翊翊至治于堯舜之上京剎江湖會稽唯實國一開堂雙徑為鳳麟之靈囿妙喜𢴃室四方稱龍象之法筵惟視古以猶今在得時而行道顧兹盛舉允副輿情徑山堂上月江和尚德重珠璣輝聮奎璧偉姿豐麗浩氣衝于斗牛道韻孔昭美譽播于湖海屢應名藍之聘久觀上國之光冝接物以利生何礙入廛而𡸁手共訝凌霄獨步謾𧩊光嶽蜚英圭齋別古𣇓于西湖語留圎鏡大覺辭仁廟于北闕事見遺書煌煌吾道有光凛凛宗綱不墜繼前賢之芳躅示後學之清規拱聽佳音永堅夙好方外𦒋林侍講匡山余𣇓陶令入遠公之社事見西江大顛接韓子之遊話行南海雖抑揚必行其志然出𠁅各得其冝契道相忘堅盟既久徑山堂上月江和尚機鋒圎妙氣宇和平東魯書西來意咸究其源雪山草滄海珠實增其價蜚佳聲于闕下霑寵渥于天中飽餐禪院之煙霞深味儒林之風月丹山儀鳳赤岸良駒黃太史秉志參禪先機獨露張商英存心護法斯道大彰尚願留衣毋忘展笑本山比丘正璠乃呆菴十一世孫也緣覩是集殘毀將泯惜其無以聞見後賢遂率徒性澄孫海舟德容圎慶明智逹各各回施衣資謹刻流通所兾閲者不動腳頭已覽一山三石怪未談舌底早知雙徑五𡶶寒悟是相非相即如來清淨法身斯觀不觀證當入遊戲三昧㓛德無邊咸歸實相萬曆七年歲次己卯端陽日沙門識
