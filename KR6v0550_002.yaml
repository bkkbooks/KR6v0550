body:
  text: 前徑山興聖萬壽禪寺住持金華宗淨集徑山國一祖師行實將仕即前守杭州右司理參軍李照撰天下山水竒秀則吳越稱首越則有天台四明為尚吳則有天目居最徑山乃天目東北峰比諸峰又復竒勝其頂則五峰周抱中有平地實洞天耳承天禪院居北焉余聞是山是寺之名久矣大中祥符辛亥奉命司憲于郡日無清暇故莫遂訪焉今年孟夏既獲美代心腑清適有命駕之興快疇昔之素俄至于是見其峰巒勝異草木鮮瑩基構高下甍簷縈帶非丹青之可狀非詠歌之可記乃問諸僧開山之事始先賢之靈迹其説頗駭人之耳焉再徴其據乃得石碑數片舊録一卷考其事實得諸僧之説半焉而又乘茟者記述事迹或得前而遺後或得後而遺前觀之者莫能𥁞見始末之實余惜此山之竒絶高先賢之茂行痛其郡記錯維難𥁞行于世使好事者不能傳之乃命茟總集其事使終始一貫前後無失然其事得于古石者存之傳于人口者勿載欲後之見者不復疑焉時大中祥符乙卯歲壬子月乙亥日記苐一代大覺國一貞元祖師師諱法欽吳郡崑山人姓朱氏世服儒業師初孕母管氏夢蓮生于戶樞取一花繫于衣帶窹乃惡葷餌既誕形貌竒偉神色營徹好以佛事為兒戲及𠜍身長七尺體備諸相學行時采為時推服年二十二州以充賦道由丹徒憩于鶴林素禪師見而異之問曰子何之師曰將求仕于上京素曰雖有五之爵豈如三界之尊耶師曰可學乎素曰觀子神觀幾于生知𠰥肯出家必悟如來知見師即裂縫掖刻苦親依素深器之謂門人法鑑曰此當大弘吾法蔚為人師師日夜奮勵鍊行安禪知徑直之一言越周旋之三學乃請素示其法要素曰無人得我法師曰以何傳素曰我法實無可傳者師頓釋疑滯久之辭素請示所止素曰乘流而行遇徑即止遂受具于餘杭龍泉寺法崙律師後之臨安行次東北山之下見樵者問曰此何山樵曰此天目山之徑路謂之徑山亦名徑塢師憶素語乃披榛而入四顧非人居適逢苫蓋以覆罝罘師就之宴坐大雪經旬絶食安禪既霽獵者見之投誠歸向師誨使更業獵者弓矢罟網以其地結菴請就居之日餉于師他日謂獵者曰吾將于此山獵者曰此山神異中有龍居師勿往師曰何患焉汝冝遵吾即自重岡之西至危峰之北有一石屏師坐其下凡數日有白衣老人前而致拜師曰汝何人也曰龍也師曰何為至此曰自師到此山吾屬五百皆不自安師必久住我將挈其屬而歸天目願捨所居為師卓錫之所引師南進登絶頂入五峰之間中有大湫指謂師曰吾家𠰥去此湫當涸矣願留一穴以通天目我欲時至而衛師焉慎勿湮之言訖乃今之龍井是也于是雲霧晦冥風雨連霄詰旦湫水𥁞涸漲沙如平地北峰之陽有菴𠑊然新成師知龍所創遂居之至今基陛諸草不生自是遠近鄉風悉來給奉四方禪衲景從菴居滿于岩谷山左有前臨海令吳貞捨別墅以蓋精舍未逾數載名震天下馬祖令人馳書書中作一圎相師開緘于圎相中作一點卻封回又令智藏來問十二時中以何為境師曰待汝回去時有信藏曰如今便回師曰傳語卻須問取曹溪有僧問如何是道師曰山上有鯉魚井底有蓬塵又僧問如何是祖師西來意師曰汝問不當曰如何得當師曰待吾滅後即向汝説永泰初師一日坐于峰北石屏之下見一白衣人稱是天目巾子山人致禮言曰彼山神告我長安佛法有難遣我護之非僧相不足以增重法門願度我為沙彌師曰汝有何能曰能誦觀音俱胝咒㓛力無比師欲驗之指坐後石屏汝能咒之令破否曰可遂叱之石裂為三今喝石岩是也師異之度為沙彌與名曰崇慧入京寓止章敬寺大曆三年戊申九月二十三日太清宮道士史華奏乞與釋氏當代名流角佛法道法勝負于時代宗留神空門道衆憤疾故有是請于東明觀架刀為梯史華登躡而上如履磴道緇侣相顧無敢躡者崇慧聞之謁開府魚朝恩朝恩為奏其事翼日敕于章敬寺庭樹間梯架鋒刃銛白如霜增東明觀之梯百尺觀者如堵崇慧跣足而登至絶梯而止欣然躡而下如行平地以至𨂻烈火探沸油餐鐵葉為餺飥嚼釘線為脆飴史華與道衆視之駭汗掩袂而走四衆讃仰聲𠰥雷霆帝遣中貴鞏廷玉傳宣慰勞嘉歎至于再三賜紫衣授鴻臚卿號曰護國三藏敕安國寺居之尋被召對問師承何人慧曰徑山高道僧法欽臣之師也慧辭以未具戒不敢受紫衣之賜帝特命開壇方羯磨慧身壇上莫知所往帝駭異賜號性空大師時疑觀音應現救護佛法因慧之奏以禮徑山為師師名益著大曆中代宗遣內侍黃鳳持詔致師詣闕其詞曰朕聞江左有藴道禪人德性氷霜淨行材野朕虗心瞻企渴仰懸懸有感必通國亦大慶願和尚遠降中天𥁞朕皈向不違願力應物現形仍敕所經州縣嚴肅館餉勒石現存既至闕庭帝躬迎登殿設座以資法要同弟子之禮師一日在內庭見帝起立帝曰師何以起師曰檀越何得向四威儀中見貧道帝悅謂忠國師曰欲賜欽師一名忠欣然奉詔乃賜號國一焉頃之辭歸帝曰此衆生有當度者彼衆生豈有殊乎師曰實無有法以度衆生居內僅一年每賜繒綵設御饌皆控而不受唯布衣蔬食器用陶匏如平時相國楊綰見而歎曰此方外之高士也難得而名焉崔趙公嘗問弟子出家得否師曰出家是大丈夫事豈將相之所能為趙歎賞其言一時名公如李泌徐浩第五琦陳少遊凡三十二人皆稱門人問道以求決擇三十二人姓名列于碑隂已而力辭南還舊山餞禮榮輝敕夲州于徑山重建精舍度僧七人以奉巾瓶命州長吏逐月躬至問候久之刺史請居州之龍興寺師亦暫往越之連帥憫其民新被寇願師往臨以福芘之師從其請或半年或一年如是者再復歸龍興與徑山不擇所止師將示滅于龍興先期三日告衆曰當葬吾于南庭隙地勿封勿樹恐妨僧徒之菜地俗壽九十二僧臘七十實貞元八年十二月二十八日也師悲願弘深見面聞名如子得母潛符密契者不知其數目之為功德山故東至海岱西及隴蜀南窮交廣北𥁞朔方學者靡不慕義而來志求咨決到于天龍敬向異類皈依地産靈芝空雨甘露聖燈夜現綵雲朝暉寺之玉芝岩含暉亭因名于此猛獸棲其傍衆禽集其室白鷴鳥鴉就掌而食有二白兔馴伏靴履之上欲師足暖有一雞常隨𥊸法不食生命師之西也長鳴三日而絶有一麕常依禪室不他逰師之滅亦三日而死貞元九年德宗賜諡號曰貞元大覺禪師塔曰天中憲宗元和十年賜豐碑比部郎中崔元𦒋撰左散騎常侍龜登書其碑在寺之西南隅師嗣牛頭宗沠得法于素素師威威師持持師方方師巖巖師懶融融師四祖信大師天復中錢氏刻土許思兵亂發塔見二缸合藏肉身如生髮長覆面士卒悚拜而去吳越王厚禮重葬于舊塔焉苐二代無上禪師禪師名宗湖州長興錢氏子也祖徽禮部侍郎父晟晦德不仕師少而頴異風骨不凡挺然有拔俗志依夲州開元寺大德高間出家年二十七受具戒間使習經業通淨名思益二經棄之逰方謁鹽官悟空禪師𥁞得其要領悟空賞識以為堪任大法咸通三年至天目東登徑山見舊寺自國一去後僧徒分散殆𥁞荒涼如傳舍師意欲追還舊觀遂駐錫焉未幾百廢具舉道望日遠學者相尋而至翕然成大法席𠜍于江浙門弟子傑出者洪察洪諲洪詣洪寂知名咸啓行謙行滿行真皆從上宗門爪牙先是諲以經論自負師告之曰佛祖正法直截亡詮汝算海沙于理何益但能莫存知見泯絶于緣離一切心即汝真性諲聞而適悅即呈偈云這箇非他物元來不昧機逹而全體現應處不思議師曰汝問取察師兄察曰師弟高見非吾境界諲即辭遍往諸方至大溈方悟旨師平時指徒語言切直類皆如此咸通七年丙戌閏三月五日集衆説法端坐而化閲世七十四坐四十八夏門人奉全身葬于寺之西大寂巖乾化五年吳越武肅王請于朝賜諡無上禪師唐之石士雲牙先生沈敬修撰靈龕銘并序又為之讃曰眉目清開風神秀發圗入丹青不差毫髮潭底無波天心印月是兮非兮師有説苐三代法濟禪師禪師諱洪諲其先吳興烏程人也姓吳氏生而神異長而聰頴十九依無上禪師削髮二十二往嵩嶽受具初習律乘未十日而誦畢棄之遊心經論機辨風生耆宿下之歸覲無上無上問曰汝于時中將何以報答四恩師芒然莫知所對廢食三日無上方便慰安之師于言下有省述偈以進無上頷之語具無上章未幾乃辭行腳始謁雲岩不契遂造大溈頓釋蒙滯再走石霜得末後句尋遇會昌之難衆皆悲惋師曰大丈夫鍾此厄會豈非命耶何乃效兒女乎大衆初復沙門相師還故里西峰院咸通七年上徑山無上委以住持事師辭甚力無上曰吳中佛法藉于子耳何辭之有開法之初衆不滿百未終歲間堂餘萬指僧問掩息如灰時如何師曰猶是時人工幹僧曰幹後如何師曰耕人田不種僧曰畢竟如何師曰禾不臨場僧問龍門不假風雷勢便透者如何師曰猶是一品二品僧曰此既是階級向上事如何師曰不知汝有龍門僧問如霜如雪時如何師曰猶是污染曰不汚染時如何師曰不同紀僧問如何是長師曰千聖不能量曰如何是短師曰蟭螟眼裏著不滿其僧不肯便去舉似石霜石霜云只為太近實頭僧問如何是長石霜云不屈曲曰如何是短石霜云雙陸盤中不喝采佛日長老訪師師問承聞長老獨化一方何以薦逰峰頂佛日曰朗月當空挂氷霜不自寒師曰莫便是長老家風佛日答曰峭峙萬重闕于中含寶月師曰此猶是文言作麼生是長老家風佛日曰今日賴遇佛日佛日卻問云密至真時人知有道不得大省無辜時人知有道得于此二途猶是時人升降處未審長老親道自道如何道師曰我家道處無可道佛日曰如來路上無𥝠曲便請玄音和一場師曰任汝二輪更互照碧潭雲外不相闕佛日曰為報白頭無限衆此回年少莫歸鄉師曰老少同輪無向背我家去路勿參差佛日曰一言㝎天下四句為誰留師曰汝言有三四我道其中一也無師因有偈曰東西不相顧南北為誰留汝言有三四我即一也無許州金明上座聞師説法頗契石霜乃曰徑山老子何敢説石霜禪我往問之彼𠰥果合我則為渠作園頭如其不然我則掀倒禪林先問石霜一毫穿衆穴時如何石霜云直須萬年後云萬年後如何石霜云登科任汝登科拔萃任汝拔萃後問師云一毫穿衆穴時如何師云直須老去云老去後如何師云光靴任汝光靴結裹任汝結裹眀乃作禮為之治圃三年師始至是山適遭黃巢之亂巢之偏帥領卒千餘人見師師宴坐不起帥以劒揮禪牀者再師神色不動帥異之獻寶再拜而去今禪牀二劍迹猶存吳越武肅王微時師一日謂其徒曰翌日有異人至當厚禮以待之詰朝王至師乃門迎延于丈室特異于他堂衆皆訝之乃密謂武肅曰他日獨霸吳越當須護持佛法無忘此言武肅恭謝而去及立軍功收杭州執弟子禮以事于師待遇勤厚莫可為比中和二年表乞賜師紫方袍景福二年武肅封吳越王復表乞賜號法濟大師中國皆制可乾寧二年乙卯九月二十九日院前柳樹忽萎厨內飯如金色知事白師師令鳴鐘大衆雲集乃升座示衆曰牟尼掩足迦葉藏峰彼彼不落見聞一句莫教人説汝須急切各自知時法界雖長世人景促佛法非遠大道不迷孝順住持如吾在日久立珍重乃修書遺武肅王復命門人沖羽久住智全遺戒曰自吾去後汝傳器住持凡度徒弟皆禮吾真為師兄弟相攝無忘此語三十日寅時入滅俗壽八十三僧獵六十一以元和八年癸巳歲生大和五年辛亥歲出家年一十九大和九年乙卯歲受具戒年二十三咸通八年丁亥歲住持當山至乾寧二年乙卯歲凡二十九年武肅王自為述讃四十句又諡師為建初興國大師及親號塔曰廣濟之塔開平五年辛未歲僧師烈製碑文貞明二年丙子歲立石武肅王將薨謂文穆王曰吾昔自徑山法濟示吾霸業自此發迹建國立㓛故吾常厚顧此山焉他日汝無廢吾志其後文穆忠獻忠懿王皆不忘武肅之遺旨恩顧山門非他可並焉苐四代慧滿扶禪師秀州人四月初七日忌辰苐五代法警庠禪師杭州人九月三十日忌辰苐六代修禪師杭州人九月十八日忌辰苐七代廣燈湛禪師秀州人四月草一日忌辰十方住持苐一代祖印悟禪師杭州人三月十六日忌辰苐二代淨慧鄰禪師杭州人正月念五日忌辰苐三代妙湛慧禪師杭州人二月三十日忌辰苐四代演教賞禪師杭州人七月初五日忌辰苐五代寶月方禪師杭州人五月十六日忌辰苐六代澄慧淵禪師杭州人十二月六日忌辰苐七代無畏琳禪師湖州人四月初三日忌辰苐八代淨慧儀禪師秀州人二月初五日忌辰苐九代覺潤雲禪師信州人十一月三日忌辰苐十代玄應仁禪師台州人九月初十日忌辰苐十一代普明舜禪師建寧人八月三日忌辰苐十二代大悟裕禪師台州人正月一日忌辰苐十三代佛日大慧杲禪師宣州奚氏諱宗杲字曇晦少師魏國公張浚延居兹山孝宗為普安郡王時聞師名遣內都監至徑山謁師師作偈以獻王甚嘉之及在建邸復遣內知客請師山中為衆説法親書妙喜菴大字及製真讃寄師又二年即位賜號大慧禪師復取向所賜宸𦒋以御寶識之恩寵加厚道法之盛號臨濟中興凡二千餘衆一時朝士𠰥馮公濟川張公九成輩皆來問道故有不動無垢二軒𨺼興元年八月十日示寂于明月堂皇帝聞之嗟惜詔以明月堂為妙喜菴賜諡普覺塔曰寶光苐十四代妙空明禪師濠州人正月十五日忌辰苐十五代真歇了禪師左綿雍氏諱清了得法于丹霞淳禪師出世真州長蘆遷四明寶陀台之天封閩之雪峰詔住溫州龍翔升兹山慈寧皇太后命開山臯亭崇先及修全身塔彼寺西華桐塢苐十六代佛行月堂昌禪師湖州人正月草日忌辰苐十七代佛海妙空訥禪師秀州人十一月草六日忌辰苐十八代照堂一禪師明州人三月十九日忌苐十九代圎悟粹禪師福州人正月草八日忌苐二十代佛慧可菴衷禪師婺州人六月初九日忌辰苐二十一代大禪明禪師秀州人妙喜會中龍象叢林所謂明大禪也身長八尺腹大十圍所至人必聚觀之出世舒州投子遷長蘆詔住兹山道望甚著先是陽和王夢一異僧長身巨腹言欲化蘇州一莊翌旦師忽杖屨徙步而至和王見師竒偉與夢中見者無異茶罷師首言大王莊田至多可施蘇州一莊以為徑山供佛齋僧無窮之福和王未有可否因令辦齋飯罷便出更無他語時內外閧然傳言和王以蘇州莊施徑山長老遂逹孝宗聖𥊸會和王入朝上為言聞卿捨蘇州莊與徑山朕當為蠲免賦稅和王謝恩歸即以莊𨽾徑山此莊歲出二萬斛犂牛舟車解庫應用百事具足師于緇素有大因緣江浙兩湖皆號之為布袋和尚再出焉六月初七日忌辰苐草二代無才禪師杭州人六月草六日忌苐草三代佛日普慈聞禪師𨺼興人十一月初四日忌辰苐草四代寓菴潛禪師興化人六月四日忌辰苐草五代密菴傑禪師福州鄭氏謁應菴于衢之眀果一日菴問如何是正法眼師遽答曰破沙盆菴頷之出世衢之烏臣遷祥符蔣山華藏詔住兹山靈晚居天童後示寂塔于天童之中峰六月十二日忌辰苐草六代別峰印禪師嘉州李氏得法于華藏民禪師首在鄉連主數剎後再出峽住保寧金山雪竇及至兹山彌浹孝宗召對選德殿奏對稱旨此日賜肩輿于東華門內上注圎覺經遣使馳賜命作序師具表奏謝仍進頌曰古佛與今佛同一廣長舌于無途轍中為物啓途轍撥開千嶂雲放出一輪月普令大地人言下悉照徹覺亦無可圎幻亦無可滅只此無亦無紅罏一點雪稽首佛與佛字字無異説既經一夜之覽皇情大悅及年邁益厭住持奏乞菴居得請終後葬于菴之西岡諡慈辨禪師塔曰智光十二月初八日忌辰苐二十七代塗毒策禪師台州人七月草七日忌辰苐二十八代佛照普慈宗覺光禪師臨江新喻人姓彭諱德光得法于妙喜乾道丁亥台守李侍郎浩延住鴻福徙光孝孝宗雅聞師名淳熙三年詔開堂靈召入觀堂留五宿數問佛法大意師敷奏直截上大悅賜佛照禪師之號明年再對進宗門直指以都下勞應接丐間山林得賜歸育王建移御重華趣令入覲漏下十刻乃退紹熙四年改涖兹山師力辭孝宗曰朝時相見耳慶元元年許還育王師老東菴嘉泰三年三月二十日説偈而逝塔全身于東菴之後諡普慧宗覺大禪師塔曰圎苐草九代雲菴慶禪師建寧人十月草三日忌苐三十代佛智蒙菴聰禪師福州人十一月十五日忌辰苐三十一代佛日石橋宣禪師蜀嘉㝎許氏橘洲曇公是其同氣嘉㝎丁丑獲知承相魯國俾居兹山創化城接待于雙溪之上眉山楊汝明記頗詳及師示寂乃塔于其後十二月十三日忌辰苐三十二代佛心浙翁琰禪師台州人七月十七日忌辰苐三十三代佛行少林嵩禪師建寧人二月草二日忌辰苐三十四代佛鑑無凖範禪師蜀梓潼雍氏依破菴先得旨出世明之清涼遷焦山雪竇被旨移育王及兹山居二十年雖兩丁火厄而旋復舊觀號法席全盛仁宗嘗召見于修政殿奏對詳明上為之動色賜金欄僧伽梨仍宣詣慈明殿升座上𡸁簾而𥊸以師所説法要示參政陳公貴𧨏陳公奏云簡明直截有補聖治乃賜佛鑑禪師號師去寺四十里作室接雲水上親灑宸𦒋賜額曰萬年正續淳祐己酉三月十八日書偈而逝全身葬正續之側塔曰圎照苐三十五代癡絶沖禪師武信長江荀氏從源生于妙果悟旨出世嘉禾光孝升蔣山雪峰詔住天童復有旨補靈尋退金陵京兆尹莭齋趙公遣書命為法華開山而敕牒住徑山之命繼至師謂不赴法華則不信重違君命則不恭失恭與信何以為後學法乃幡然而作留法華逾月即登徑山故神人響合惟聲如雷臨示滅手書龕記敘得法之由及辭衆上堂語至夜分起坐移頃而逝壽八十二臘六十一茶毗奉骨葬金陵玉山菴分其半建塔莆田玉芝菴三月十五日忌辰苐三十六代佛海石溪月禪師眉州人六月初九日忌辰苐三十七代佛智偃溪聞禪師閩侯官人六月十四日忌辰苐三十八代佛心荊叟珏禪師婺州人十二月初十日忌辰苐三十九代淮海肇禪師通州人六月十日忌苐四十代虗堂愚禪師明州人十月八日忌辰苐四十一代藏叟珍禪師泉州人五月草一日忌苐四十二代虗舟度禪師楊州人四月草四日忌苐四十三代雲峰高禪師福之長溪人諱妙高見偃溪于育王入室掌藏鑰一日溪舉譬如牛過窗楞頭角四蹄都過了因甚尾巴過不得師劃然有省答曰鯨吞海水𥁞露出珊瑚枝溪可之出世南興大蘆遷江隂勸忠霅川何山朝命升蔣山至元𢈏辰遷兹山寺罹回祿草創什一師究心興建不十年悉還舊觀戊子江淮棇統揚輦真加率江南禪教諸山朝覲師遂趨京上問禪以何為宗師奏淨智妙圎體夲空寂非見聞覺知思慮分別所能到宣問再三師歷舉西天東土諸祖因緣大抵禪是正法眼藏涅槃妙心超最上乘孰有過于禪詞旨明顯餘二千言上大悅陛辭南歸徑山復災師謂衆曰吾宿負此山債耳遂竭力再營建匯殿坡為池他屋以次落成癸巳六月十七日書偈而逝苐四十四代虎岩伏禪師淮安人七月二日忌苐四十五代夲源逹禪師台州人十二月十八日忌辰苐四十六代晦機熙禪師𨺼興人八月十七日忌辰苐四十七代大圎佛鑑虗谷陵禪師四月十二日忌辰苐四十八代佛日普照元叟端禪師族臨海何氏諱行端從俗叔父茂上人得度于餘杭化城院參藏叟于徑山得旨大德𢈏子出世湖之資福名聞京國特旨賜慧文正辨禪師行中書省平章張閭公舉師住中天竺復遷居靈有旨設水陸齋于金山命師説法竣事入覲奏對稱旨加賜佛日普照之號南歸即退閭于良渚之西菴至治壬戌三宗四衆相率白于行宣政院請師補處兹山仍闔詞奏請降璽書護持師至是凡三被金襴之賜人以為榮而師莫如也虎岩住兹山時師為苐一座每聞虎岩法座上舉云度宗為北兵攻急命道士設大醮奏章天庭問國家重事高公伏章久不得報既竣事問故高公云為㝎徑山四十八代住持天門不開故得報遲也虎岩舉此夸衆謂住持豈苟然至于四十八代住持尚預㝎之天庭師聞頗心非之及師住此山適當其次至正辛巳終窆全身于寂照塔院壽八十八八月初四日忌辰苐四十九代廣慈曇芳忠禪師南康人十月二十八日忌辰苐五十代佛慈法喜南楚悅禪師𨺼興人十月二日忌辰苐五十一代慧性文敏古𣇓銘禪師明州人正月二十二日忌辰苐五十二代佛慧慈照竺遠源禪師南康人六月二十六日忌辰苐五十三代以中及禪師蘇州人九月四日忌苐五十四代悅堂顏禪師明州人八月草三忌苐五十五代季潭泐禪師台州人九月初十日晨起喚侍者曰這個聻者茫然師曰苦遂寂苐五十六代象源禪師台州人六月初四日趍入門曰殺來了殺來了作麼生避遂坐脫第五十七代復原報禪師台州人九月二十六日忽拍手曰阿呵呵大衆是甚麼看取竟寂第五十八代大宗興禪師台州人三月十一日忽嘆曰夫三十婦六齡畢竟偶不成遂坐去第五十九代止菴祥禪師杭州人十月十三日倚座曰一隊噇糟漢我爭如你何不道竟寂苐六十代呆菴莊禪師台州人也住持徑山學者雲合説法酬問迅𠰥疾雷有呆菴語録行于世誦師言則見轟轟然誠宗門偉人也忽于十月二十三日云難難二八嬌娘上高山老僧扶不得言竟遂寂厥年歲次志者失載第六十一代岱宗泰禪師紹興人盥罷即坐寂苐六十二代伯藴琇禪師蘇州人倚杖而逝苐六十三代敬菴莊禪師台州人含笑坐化苐六十四代雷菴澤禪師蘇州人八月初五化苐六十五代月江淨禪師金華人念佛坐去苐六十六代雪崖珂禪師金陵人晝沐而逝苐六十七代西疇頃禪師會𥟵人整衣坐去嘉靖𢈏寅仲春大尹尹公入寺祝延因覽荒景憫其苔莓剝落嘆息于斯因檢舊集頗得其詳矣曩時板集歲深幾泯賴補缺略勉寺捐資重刻于兹纘述自六十八代至八十代次列于左焉苐六十八代宇中宸禪師金華人徑行頃坐去苐六十九代傑𡶶英禪師金華人持金剛而逝苐七十代一清天禪師江右廬陵人也別號潔祖為歐陽族自幼頴悟異群不茹葷酒厭塵俗遂出家于寶禮正宗忠公授業焉宣德改元丙午得度于右街雲海法師潛侍香于大天界達會中即左街講經制授弘慈普應禪師是也隨典藏事未幾升首座開古迹黑塔于都阜城門之西鄰朝天宮之右傍也個磚片瓦皆自手焉正統癸亥聞于上敕額曰弘慶禪寺即黑塔也師萃超群卓卓然初主水月次遷南通法至開山弘慶自此道風浩蕩朝野知名正統丙寅右街善世大功德兩菴宗師薦師于春官𠰥大宗伯胡公老先巨卿名公莫不推賞遂有雙徑之行覺山馮印施華嚴大經并亟繍幡幢入殿恭養一時金臺諸檀越沈福誠杜弘真欣然發心鬻鐵鑄佛三軀鐘罄聲雲板香罏花瓶𠰥干對越明年丁卯入院浙江都指揮使司張公敬師道行咸嘉獎助住持所履之事大有徑庭其他備乎𦒋林張先生之序此蓋述其大要云苐七十一代無極灝禪師誦心經坐脫苐七十二代宗勝胤禪師常時禮佛一日卧去苐七十三代正覺成禪師持戒精專無病而寂苐七十四代用璚琚禪師禪定不懈端坐默化苐七十五代竺芳蕊禪師常説法勉人忽坐逝苐七十六代庭禮訓禪師十年不出戶忽坐去苐七十七代天才英禪師每勸人念佛念佛終苐七十八代悅山愷禪師常笑無嗔亦笑而寂苐七十九代石窗珉禪師耽文證果趺坐而化苐八十代月林鏡禪師杭州人住徑山時進士張公讃之曰宓以舞鳳飛龍五結青蓮于天目靈雞馴兔一鑑光徹于祖師地既曰靈天其有待共惟新命徑山堂上大和尚鏡公月林禪師瑞芝三秀古柏十圍得正度于無傳嗣妙法于東嶼頃者五百間清風淨掃人望方歸邇來三十年優鉢猛闓王氣猶在起龍瞑于下界興象教于中衰承相開選佛場和尚晤出世法乘流而行遇徑而止命當年國一亦起于崑山容首度坡仙重遊于方丈凡吾方外之交𥁞讃僧中此郎師少頴異稚齡出家弱𠜍剃染專淨業間叩名碩俾𠫵夲來人久乃省作偈曰夲來人夲來人無腦無頭作麼尋驀然揪著箇鼻孔試勘元來是白丁碩見睨視曰可是師與一摑由是名振一時正德己卯歸寂年八十六塔凌霄東崕
