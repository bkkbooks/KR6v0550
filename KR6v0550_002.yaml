body:
  text: 前徑山興聖萬壽禅寺住持金華宗淨集徑山國一祖師行寔將仕即前守杭州右司理叅軍李照𢰅天下山水竒秀則吳越稱首越則有天台四明為尚吳則有天目居最徑山乃天目東北峰比諸峰又復竒勝其頂則五峰周抱中有平地實洞天耳承天禅院居北焉余聞是山是寺之名久矣大中祥符辛亥奉命司憲于郡日無清暇故莫遂訪焉今年孟夏既獲羙代心腑清適有命駕之興快疇昔之素俄至于是見其峰峦勝異草木鮮瑩基構高下甍檐縈帶非丹青之可状非詠歌之可記乃問諸僧開山之事始先賢之靈迹其說頗駭人之耳焉𠕅徴其據乃得石碑数片𦾔録一卷考其事寔得諸僧之說半焉而又乗茟者記述事迹或得前而遺後或得後而遺前觀之者莫能𥁞見始末之實余惜此山之竒絕高先賢之茂行痛其郡記錯維難𥁞行扵世使好事者不能傳之乃命茟縂集其事使終始一貫前後無失然其事得扵古石者存之傳扵人口者勿載欲後之見者不復疑焉時大中祥符乙卯𡻕壬子月乙亥日記苐一代大覺國一貞元祖師師諱法欽吳郡崑山人姓朱氏世服儒業師初孕母管氏夢蓮生扵戶樞取一花繫扵衣帶窹乃惡葷餌既誕形貌竒偉神色營徹好以佛事為兒戲及𠜍身長七尺體備諸相學行時采為時推服年二十二州以充賦道由丹徒憇于鶴林素禅師見而異之問曰子何之師曰将求仕扵上京素曰𨿽有五之爵豈如三界之尊耶師曰可學乎素曰觀子神觀幾扵生知𠰥肯出家必悟如来知見師即裂縫掖刻苦親依素深器之謂門人法鑑曰此當大弘吾法蔚為人師師日夜奮励鍊行安禅知徑直之一言越周旋之三學廼請素示其法要素曰無人得我法師曰以何傳素曰我法寔無可傳者師頓釋疑滯久之辭素請示所止素曰乗流而行遇徑即止遂受具扵餘杭龍泉寺法崙律師後之臨安行次東北山之下見樵者問曰此何山樵曰此天目山之徑路謂之徑山亦名徑塢師憶素語廼披榛而入四顧非人居適逢苫蓋以覆罝罘師就之宴坐大雪經旬絕食安禅既霽獵者見之投誠歸向師誨使更業獵者弓矢罟網以其地結菴請就居之日餉扵師他日謂獵者曰吾将扵此山獵者曰此山神異中有龍居師勿徃師曰何患焉汝冝遵吾即自重岡之西至危峰之北有一石屏師坐其下凡数日有白衣老人前而致拜師曰汝何人也曰龍也師曰何為至此曰自師到此山吾屬五百皆不自安師必久住我将挈其屬而歸天目願捨所居為師卓錫之所引師南進登絕頂入五峰之間中有大湫指謂師曰吾家𠰥去此湫當涸矣願留一穴以通天目我欲時至而衛師焉慎勿湮之言訖乃今之龍井是也扵是雲霧晦冥風雨連霄詰旦湫水𥁞涸漲沙如平地北峰之陽有菴𠑊然新成師知龍所創遂居之至今基陛諸草不生自是遠近鄉風悉来給奉四方禅衲景從菴居滿扵岩谷山左有前臨海令吳貞捨別墅以盖精舎未逾数載名震天下馬祖令人馳書書中作一圎相師開緘扵圎相中作一點卻封囘又令智蔵来問十二時中以何為境師曰待汝囘去時有信蔵曰如今便囘師曰傳語卻須問取曹溪有僧問如何是道師曰山上有鯉魚井底有蓬塵又僧問如何是祖師西来意師曰汝問不當曰如何得當師曰待吾滅後即向汝說永㤗初師一日坐于峰北石屏之下見一白衣人稱是天目巾子山人致禮言曰彼山神告我長安佛法有難遣我護之非僧相不足以増重法門願度我為沙彌師曰汝有何能曰能誦觀音俱胝咒㓛力無比師欲驗之指坐後石屏汝能咒之令破否曰可遂叱之石裂為三今喝石岩是也師異之度為沙彌與名曰崇慧入京寓止章敬寺大曆三年戊申九月二十三日太清宮道士史華奏乞與釋氏當代名流角佛法道法勝負于時代宗留神空門道眾憤疾故有是請扵東明觀架刀為梯史華登躡而上如履磴道緇侣相顧無敢躡者崇慧聞之謁開府魚朝恩朝恩為奏其事翼日𠡠扵章敬寺庭𣗳間梯架鋒刃銛白如霜増東明觀之梯百尺觀者如堵崇慧跣足而登至絕梯而止忻然躡而下如行平地以至𨂻烈火探沸油餐鉄葉為䬪飥嚼釘線為脆飴史華與道眾視之駭汗掩袂而走四眾讃仰聲𠰥雷霆帝遣中貴鞏廷玉傳宣慰劳嘉歎至于𠕅三賜紫衣授鴻臚卿號曰護國三蔵𠡠安國寺居之尋被召對問師承何人慧曰徑山高道僧法欽臣之師也慧辭以未具戒不敢受紫衣之賜帝特命開壇方羯磨慧身壇上莫知所往帝駭異賜號性空大師時疑觀音應現救護佛法因慧之奏以禮徑山為師師名益著大曆中代宗遣內侍黃鳳持詔致師詣闕其詞曰朕聞江左有藴道禅人德性氷霜淨行材野朕虗心瞻企渴仰懸懸有感必通國亦大慶願和尚遠䧏中天𥁞朕皈向不違願力應物現形仍敕所經州縣厳粛舘餉勒石現存既至闕庭帝躬迎登殿設座以資法要同弟子之禮師一日在內庭見帝起立帝曰師何以起師曰檀越何得向四威儀中見貧道帝悅謂忠國師曰欲賜欽師一名忠忻然奉詔廼賜號國一焉頃之辭歸帝曰此眾生有當度者彼眾生豈有殊乎師曰實無有法以度眾生居內僅一年每賜繒綵設御饌皆控而不受唯布衣蔬食器用陶匏如平時相國楊綰見而歎曰此方外之高士也難得而名焉崔趙公甞問弟子出家得否師曰出家是大丈夫事豈将相之所能為趙歎賞其言一時名公如李泌徐浩第五琦陳少㳺凡三十二人皆稱門人問道以求決擇三十二人姓名列于碑隂已而力辭南還𦾔山餞禮榮輝敕夲州扵徑山重建精舎度僧七人以奉巾瓶命州長吏逐月躬至問候久之刺史請居州之龍興寺師亦暫往越之連帥憫其民新被𡨥願師往臨以福芘之師從其請或半年或一年如是者𠕅復歸龍興與徑山不擇所止師将示滅于龍興先期三日告眾曰當葬吾扵南庭隙地勿封勿𣗳恐妨僧徒之菜地俗壽九十二僧臈七十寔貞元八年十二月二十八日也師悲願弘深見面聞名如子得母潜符密契者不知其数目之為功德山故東至海岱西及隴蜀南窮交廣北𥁞朔方學者靡不慕義而来志求咨决到扵天龍敬向異類皈依地產靈芝空雨甘露聖燈夜現綵雲朝暉寺之玉芝岩含暉亭因名扵此猛獸棲其傍眾禽集其室白鷴鳥鴉就掌而食有二白兎馴伏靴履之上欲師足煖有一雞常随𦗟法不食生命師之西也長鳴三日而絕有一麕常依禅室不他逰師之滅亦三日而死貞元九年德宗賜諡號曰貞元大覺禅師塔曰天中憲宗元和十年賜豐碑比部郎中崔元𦒋撰左散騎常侍龜登書其碑在寺之西南隅師嗣牛頭宗沠得法扵素素師威威師持持師方方師巌巌師嬾融融師四祖信大師天復中錢氏刻土許思兵亂𤼲塔見二缸合蔵肉身如生髮長覆面士卒悚拜而去吳越王厚禮重葬于𦾔塔焉苐二代無上禅師禅師名宗湖州長興錢氏子也祖徽禮部侍郎父晟晦德不仕師少而頴異風骨不凡挺然有拔俗志依夲州開元寺大德高間出家年二十七受具戒間使習經業通淨名思益二經棄之逰方謁鹽官悟空禅師𥁞得其要領悟空賞識以為堪任大法咸通三年至天目東登徑山見𦾔寺自國一去後僧徒分散殆𥁞荒凉如傳舎師意欲追還𦾔觀遂駐錫焉未幾百廢具舉道望日遠學者相尋而至翕然成大法席𠜍扵江淛門弟子傑出者洪察洪諲洪詣洪𡨜知名咸啟行謙行滿行真皆從上宗門爪牙先是諲以經論自負師告之曰佛祖正法直截亡詮汝𥮅海沙扵理何益但能莫存知見泯絕扵縁離一切心即汝真性諲聞而適悅即呈偈云這箇非他物元来不昧機逹而全體現應處不思議師曰汝問取察師兄察曰師弟高見非吾境界諲即辭徧往諸方至大溈方悟旨師平時指徒語言切直類皆如此咸通七年丙戌閏三月五日集眾說法端坐而化閱世七十四坐四十八夏門人奉全身葬于寺之西大𡨜巌乾化五年吳越武粛王請于朝賜諡無上禅師唐之石士雲牙先生沈敬修𢰅靈龕銘并序又為之讃曰眉目清開風神秀𤼲圗入丹青不差毫髮潭底無波天心印月是兮非兮師有說苐三代法濟禅師禅師諱洪諲其先吳興烏程人也姓吳氏生而神異長而聦頴十九依無上禅師削髮二十二往嵩嶽受具初習律乗未十日而誦畢棄之㳺心經論機辯風生耆宿下之歸覲無上無上問曰汝扵時中将何以報答四恩師芒然莫知所對廢食三日無上方便慰安之師扵言下有省述偈以進無上頷之語具無上章未幾乃辭行脚始謁雲岩不契遂造大溈頓釋蒙滯𠕅走石霜得末後句尋遇會昌之難眾皆悲惋師曰大丈夫鍾此厄會豈非命耶何乃効兒女乎大眾初復沙門相師還故里西峰院咸通七年上徑山無上委以住持事師辭甚力無上曰吳中佛法藉扵子耳何辭之有開法之初眾不滿百未終𡻕間堂餘萬指僧問掩息如灰時如何師曰猶是時人工幹僧曰幹後如何師曰耕人田不種僧曰畢竟如何師曰禾不臨塲僧問龍門不假風雷勢便透者如何師曰猶是一品二品僧曰此既是階級向上事如何師曰不知汝有龍門僧問如霜如雪時如何師曰猶是污染曰不汚染時如何師曰不同紀僧問如何是長師曰千聖不能量曰如何是短師曰蟭螟眼裏着不滿其僧不肯便去舉似石霜石霜云只為太近寔頭僧問如何是長石霜云不屈曲曰如何是短石霜云雙陸盤中不喝采佛日長老訪師師問承聞長老獨化一方何以薦逰峰頂佛日曰朗月當空挂氷霜不自寒師曰莫便是長老家風佛日答曰峭峙萬重闕扵中含寳月師曰此猶是文言作麽生是長老家風佛日曰今日賴遇佛日佛日卻問云密至真時人知有道不得大省無辜時人知有道得扵此二途猶是時人昇䧏處未審長老親道自道如何道師曰我家道處無可道佛日曰如来路上無𥝠曲便請玄音和一塲師曰任汝二輪更互照碧潭雲外不相闕佛日曰為報白頭無限眾此囬年少莫歸鄉師曰老少同輪無向背我家去路勿叅差佛日曰一言㝎天下四句為誰留師曰汝言有三四我道其中一也無師因有偈曰東西不相顧南北為誰留汝言有三四我即一也無許州金明上座聞師說法頗契石霜乃曰徑山老子何敢說石霜禅我往問之彼𠰥果合我則為渠作園頭如其不然我則掀倒禅林先問石霜一毫穿眾穴時如何石霜云直須萬年後云萬年後如何石霜云登科任汝登科拔萃任汝拔萃後問師云一毫穿眾穴時如何師云直須老去云老去後如何師云光靴任汝光靴結裹任汝結裹眀乃作禮為之治圃三年師始至是山適遭黃巢之亂巢之偏帥領卒千餘人見師師宴坐不起帥以劒揮禅牀者𠕅師神色不動帥異之獻寳𠕅拜而去今禅牀二劍迹猶存吳越武粛王微時師一日謂其徒曰翌日有異人至當厚禮以待之詰朝王至師乃門迎延于丈室特異扵他堂眾皆訝之乃密謂武粛曰他日獨覇吳越當須護持佛法無忘此言武粛恭謝而去及立軍功收杭州執弟子禮以事扵師待遇勤厚莫可為比中和二年表乞賜師紫方袍景福二年武粛封吳越王復表乞賜號法濟大師中國皆制可乹寧二年乙卯九月二十九日院前檉𣗳忽萎厨內飯如金色知事白師師令鳴鐘大眾雲集乃陞座示眾曰牟尼掩足迦葉蔵峰彼彼不落見聞一句莫教人說汝須急切各自知時法界𨿽長世人景促佛法非遠大道不迷孝順住持如吾在日久立珍重乃脩書遺武粛王復命門人冲羽久住智全遺戒曰自吾去後汝傳器住持凡度徒弟皆禮吾真為師兄弟相攝無忘此語三十日寅時入滅俗壽八十三僧獵六十一以元和八年癸巳𡻕生大和五年辛亥𡻕出家年一十九大和九年乙卯𡻕受具戒年二十三咸通八年丁亥𡻕住持當山至乾寧二年乙卯𡻕凡二十九年武粛王自為述讃四十句又諡師為建初興國大師及親號塔曰廣濟之塔開平五年辛未𡻕僧師烈製碑文貞明二年丙子𡻕立石武粛王将薨謂文穆王曰吾昔自徑山法濟示吾覇業自此𤼲迹建國立㓛故吾常厚頋此山焉他日汝無廢吾志其後文穆忠獻忠懿王皆不忘武粛之遺旨恩頋山門非他可並焉苐四代慧滿扶禅師秀州人四月初七日忌辰苐五代法警庠禅師杭州人九月三十日忌辰苐六代脩禅師杭州人九月十八日忌辰苐七代廣燈湛禅師秀州人四月廿一日忌辰十方住持苐一代祖印悟禅師杭州人三月十六日忌辰苐二代淨慧隣禅師杭州人正月念五日忌辰苐三代妙湛慧禅師杭州人二月三十日忌辰苐四代演教賞禅師杭州人七月初五日忌辰苐五代寳月方禅師杭州人五月十六日忌辰苐六代澄慧淵禅師杭州人十二月六日忌辰苐七代無畏琳禅師湖州人四月初三日忌辰苐八代淨慧儀禅師秀州人二月初五日忌辰苐九代覺潤雲禅師信州人十一月三日忌辰苐十代玄應仁禅師台州人九月初十日忌辰苐十一代普明舜禅師建寧人八月三日忌辰苐十二代大悟裕禅師台州人正月一日忌辰苐十三代佛日大慧杲禅師宣州奚氏諱宗杲字曇晦少師魏國公張浚延居兹山孝宗為普安郡王時聞師名遣內都監至徑山謁師師作偈以獻王甚嘉之及在建邸復遣內知客請師山中為眾說法親書妙喜菴大字及製真讃寄師又二年即位賜號大慧禅師復取向所賜宸𦒋以御寳識之恩寵加厚道法之盛號臨濟中興凡二千餘眾一時朝士𠰥馮公濟川張公九成輩皆来問道故有不動無垢二軒𨺼興元年八月十日示𡨜于明月堂皇帝聞之嗟惜詔以明月堂為妙喜菴賜諡普覺塔曰寳光苐十四代妙空明禅師濠州人正月十五日忌辰苐十五代真歇了禅師左綿雍氏諱清了得法扵丹霞淳禅師出世真州長蘆遷四明寳陀台之天封閩之雪峰詔住温州龍翔陞兹山慈寧皇太后命開山臯亭崇先及修全身塔彼寺西華桐塢苐十六代佛行月堂昌禅師湖州人正月廿日忌辰苐十七代佛海妙空訥禅師秀州人十一月廿六日忌辰苐十八代照堂一禅師明州人三月十九日忌苐十九代圎悟粹禅師福州人正月廿八日忌苐二十代佛慧可菴衷禅師婺州人六月初九日忌辰苐二十一代大禅明禅師秀州人妙喜會中龍象叢林所謂明大禅也身長八尺腹大十圍所至人必聚觀之出世舒州投子遷長蘆詔住兹山道望甚著先是陽和王夢一異僧長身巨腹言欲化蘇州一庄翌旦師忽杖屦徙步而至和王見師竒偉與夢中見者無異茶罷師首言大王庄田至多可施蘇州一庄以為徑山供佛齋僧無窮之福和王未有可否因令辦齋飯罷便出更無他語時內外閧然傳言和王以蘇州庄施徑山長老遂逹孝宗聖𦗟會和王入朝上為言聞卿捨蘇州庄與徑山朕當為蠲免賦稅和王謝恩歸即以庄𨽾徑山此庄𡻕出二萬斛犂牛舟車解庫應用百事具足師扵緇素有大因縁江浙兩湖皆號之為布袋和尚𠕅出焉六月初七日忌辰苐廿二代無才禅師杭州人六月廿六日忌苐廿三代佛日普慈聞禅師𨺼興人十一月初四日忌辰苐廿四代寓菴潛禅師興化人六月四日忌辰苐廿五代密菴傑禅師福州鄭氏謁應菴扵衢之眀果一日菴問如何是正法眼師遽答曰破沙盆菴頷之出世衢之烏臣遷祥符蒋山華蔵詔住兹山靈晚居天童後示𡨜塔于天童之中峰六月十二日忌辰苐廿六代別峰印禅師嘉州李氏得法扵華蔵民禅師首在鄉連主数剎後𠕅出峽住保寧金山雪竇及至兹山彌浹孝宗召對選德殿奏對稱旨此日賜肩輿扵東華門內上註圎覺經遣使馳賜命作序師具表奏謝仍進頌曰古佛與今佛同一廣長舌扵無途轍中為物啟途轍撥開千嶂雲放出一輪月普令大地人言下悉照徹覺亦無可圎幻亦無可滅只此無亦無紅罏一點雪稽首佛與佛字字無異說既經一夜之覧皇情大悅及年邁益厭住持奏乞菴居得請終後葬于菴之西岡諡慈辨禅師塔曰智光十二月初八日忌辰苐二十七代塗毒筞禅師台州人七月廿七日忌辰苐二十八代佛照普慈宗覺光禅師臨江新喻人姓彭諱德光得法扵妙喜乾道丁亥台守李侍郎浩延住鴻福徙光孝孝宗雅聞師名淳熈三年詔開堂靈召入觀堂留五宿数問佛法大意師敷奏直截上大悅賜佛照禅師之號明年𠕅對進宗門直指以都下劳應接丐間山林得賜歸育王建移御重華趣令入覲漏下十刻乃退紹熈四年改涖兹山師力辭孝宗曰朝時相見耳慶元元年許還育王師老東菴嘉㤗三年三月二十日說偈而逝塔全身扵東菴之後諡普慧宗覺大禅師塔曰圎苐廿九代雲菴慶禅師建寧人十月廿三日忌苐三十代佛智蒙菴聡禅師福州人十一月十五日忌辰苐三十一代佛日石橋宣禅師蜀嘉㝎許氏橘洲曇公是其同氣嘉㝎丁丑獲知承相魯國俾居兹山創化城接待扵雙谿之上眉山楊汝明記頗詳及師示𡨜乃塔于其後十二月十三日忌辰苐三十二代佛心浙翁琰禅師台州人七月十七日忌辰苐三十三代佛行少林崧禅師建寧人二月廿二日忌辰苐三十四代佛鑑無凖範禅師蜀梓潼雍氏依破菴先得旨出世明之清凉遷焦山雪竇被旨移育王及兹山居二十年𨿽兩丁火厄而旋復𦾔觀號法席全盛仁宗甞召見扵修政殿奏對詳明上為之動色賜金欄僧伽梨仍宣詣慈明殿陞座上𡸁簾而𦗟以師所說法要示叅政陳公貴𧨏陳公奏云簡明直截有補聖治乃賜佛鑑禅師號師去寺四十里作室接雲水上親洒宸𦒋賜額曰萬年正續淳祐己酉三月十八日書偈而逝全身葬正續之側塔曰圎照苐三十五代癡絕冲禅師武信長江荀氏從源生扵妙果悟旨出世嘉禾光孝陞蒋山雪峰詔住天童復有旨補靈尋退金陵京兆尹莭齋趙公遣書命為法華開山而敕牒住徑山之命継至師謂不赴法華則不信重違君命則不恭失恭與信何以為後學法乃幡然而作留法華逾月即登徑山故神人響合惟聲如雷臨示滅手書龕記叙得法之由及辭眾上堂語至夜分起坐移頃而逝壽八十二臈六十一茶毘奉骨葬金陵玉山菴分其半建塔莆田玉芝菴三月十五日忌辰苐三十六代佛海石谿月禅師眉州人六月初九日忌辰苐三十七代佛智偃谿聞禅師閩侯官人六月十四日忌辰苐三十八代佛心荊叟珏禅師婺州人十二月初十日忌辰苐三十九代淮海肇禅師通州人六月十日忌苐四十代虗堂愚禅師明州人十月八日忌辰苐四十一代蔵叟珍禅師泉州人五月廿一日忌苐四十二代虗舟度禅師楊州人四月廿四日忌苐四十三代雲峰高禅師福之長谿人諱妙高見偃谿扵育王入室掌蔵鑰一日谿舉譬如牛過窓楞頭角四蹄都過了因甚尾巴過不得師劃然有省答曰鯨吞海水𥁞露出珊瑚枝谿可之出世南興大蘆遷江隂勸忠霅川何山朝命陞蒋山至元𢈏辰遷兹山寺罹回禄草創什一師究心興建不十年悉還𦾔觀戊子江淮棇統揚輦真加率江南禅教諸山朝覲師遂趋京上問禅以何為宗師奏淨智妙圎體夲空𡨜非見聞覺知思慮分別所能到宣問𠕅三師歷舉西天東土諸祖因縁大抵禅是正法眼蔵涅槃妙心超最上乗孰有過扵禅詞旨明顯餘二千言上大悅陛辭南歸徑山復災師謂眾曰吾宿負此山債耳遂竭力𠕅營建匯殿坡為池他屋以次落成癸巳六月十七日書偈而逝苐四十四代虎岩伏禅師淮安人七月二日忌苐四十五代夲源逹禅師台州人十二月十八日忌辰苐四十六代晦機熈禅師𨺼興人八月十七日忌辰苐四十七代大圎佛鑑虗谷陵禅師四月十二日忌辰苐四十八代佛日普照元叟端禅師族臨海何氏諱行端從俗叔父茂上人得度扵餘杭化城院叅蔵叟扵徑山得旨大德𢈏子出世湖之資福名聞京國特旨賜慧文正辯禅師行中書省平章張閭公舉師住中天竺復遷居靈有旨設水陸齋于金山命師說法竣事入覲奏對稱旨加賜佛日普照之號南歸即退閭于良渚之西菴至治壬戌三宗四眾相率白扵行宣政院請師補處兹山仍闔詞奏請䧏璽書護持師至是凡三被金襴之賜人以為榮而師莫如也虎岩住兹山時師為苐一座每聞虎岩法座上舉云度宗為北兵攻急命道士設大醮奏章天庭問國家重事高公伏章久不得報既竣事問故高公云為㝎徑山四十八代住持天門不開故得報遲也虎岩舉此夸眾謂住持豈苟然至扵四十八代住持尚預㝎之天庭師聞頗心非之及師住此山適當其次至正辛巳終窆全身扵𡨜照塔院壽八十八八月初四日忌辰苐四十九代廣慈曇芳忠禅師南康人十月二十八日忌辰苐五十代佛慈法喜南楚悅禅師𨺼興人十月二日忌辰苐五十一代慧性文敏古𣇓銘禅師明州人正月二十二日忌辰苐五十二代佛慧慈照竺遠源禅師南康人六月二十六日忌辰苐五十三代以中及禅師蘇州人九月四日忌苐五十四代悅堂顏禅師明州人八月廿三忌苐五十五代季潭泐禅師台州人九月初十日晨起喚侍者曰這個聻者茫然師曰苦遂𡨜苐五十六代象源禅師台州人六月初四日趍入門曰殺来了殺来了作麽生避遂坐脫第五十七代復原報禅師台州人九月二十六日忽拍手曰阿呵呵大眾是甚麽看取竟𡨜第五十八代大宗興禅師台州人三月十一日忽嘆曰夫三十婦六齡畢竟偶不成遂坐去第五十九代止菴祥禅師杭州人十月十三日𠋣座曰一隊噇糟漢我爭如你何不道竟𡨜苐六十代呆菴莊禅師台州人也住持徑山學者雲合說法酬問迅𠰥疾雷有呆菴語録行扵世誦師言則見轟轟然誠宗門偉人也忽扵十月二十三日云難難二八嬌娘上高山老僧扶不得言竟遂𡨜厥年𡻕次誌者失載第六十一代岱宗㤗禅師紹興人盥罷即坐𡨜苐六十二代伯藴琇禅師蘇州人𠋣杖而逝苐六十三代敬菴莊禅師台州人含笑坐化苐六十四代雷菴澤禅師蘇州人八月初五化苐六十五代月江淨禅師金華人念佛坐去苐六十六代雪崖珂禅師金陵人晝沐而逝苐六十七代西疇頃禅師會𥟵人整衣坐去嘉靖𢈏寅仲春大尹尹公入寺祝延因覧荒景憫其苔莓剥落嘆息于斯囙檢𦾔集頗得其詳矣曩時板集𡻕深幾泯賴補缺略勉寺捐資重刻于兹纘述自六十八代至八十代次列于左焉苐六十八代宇中宸禅師金華人徑行頃坐去苐六十九代傑𡶶英禅師金華人持金剛而逝苐七十代一清𠀡禅師江右廬陵人也別號潔祖為歐陽族自幼頴悟異群不茹葷酒厭塵俗遂出家扵寳禮正宗忠公授業焉宣德改元丙午得度扵右街雲海法師潜侍香于大天界達會中即左街講經制授弘慈普應禅師是也随典蔵事未幾陞首座開古蹟黑塔于都阜城門之西隣朝天宮之右傍也個磚片瓦皆自手焉正統癸亥聞于上敕額曰弘慶禅寺即黑塔也師萃超群卓卓然初主水月次遷南通法至開山弘慶自此道風浩蕩朝野知名正統丙寅右街𠵊世大功德兩菴宗師薦師于春官𠰥大宗伯胡公老先鉅卿名公莫不推賞遂有雙徑之行覺山馮印施華厳大經并亟繍幡幢入殿恭養一時金臺諸檀越沈福誠杜弘真欣然𤼲心鬻鐵鑄佛三軀鐘罄聲雲板香罏花瓶𠰥干對越明年丁卯入院浙江都指揮使司張公敬師道行咸嘉獎助住持所履之事大有逕庭其他俻乎𦒋林張先生之序此盖述其大要云苐七十一代無極灝禅師誦心經坐脫苐七十二代宗勝胤禅師常時禮佛一日卧去苐七十三代正覺成禅師持戒精專無病而𡨜苐七十四代用璚琚禅師禅定不懈端坐默化苐七十五代竺芳蕋禅師常說法勉人忽坐逝苐七十六代庭禮訓禅師十年不出戶忽坐去苐七十七代天才英禅師每勸人念佛念佛終苐七十八代悅山愷禅師常笑無嗔亦笑而𡨜苐七十九代石窓珉禅師躭文證果趺坐而化苐八十代月林鏡禅師杭州人住徑山時進士張公讃之曰宓以舞鳳飛龍五結青蓮扵天目靈雞馴兎一鑑光徹扵祖師地既曰靈天其有待共惟新命徑山堂上大和尚鏡公月林禅師瑞芝三秀古栢十圍得正度扵無傳嗣玅法扵東嶼頃者五百間清風淨掃人望方歸邇来三十年優鉢猛闓王氣猶在起龍瞑扵下界興象教扵中衰承相開𨕖佛塲和尚晤出世法乗流而行遇徑而止命當年國一亦起扵崑山容首度坡仙重㳺扵方丈凡吾方外之交𥁞讃僧中此郎師少頴異穉齡出家弱𠜍剃染專淨業間叩名碩俾𠫵夲来人久乃省作偈曰夲来人夲来人無腦無頭作麽尋驀然揪著箇鼻孔試勘元来是白丁碩見睨視曰可是師與一摑由是名振一時正德己卯歸𡨜年八十六塔凌霄東崕
