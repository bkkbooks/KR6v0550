body:
  text: 前徑山興聖萬壽禪寺住持金華宗淨集臨安志云徑山興聖萬壽禪寺在臨安縣之北三十里乃天目之東北山也開山曰國一禪師法欽唐代宗時詔杭州即其菴建徑山寺乾符六年改賜為乾符鎮國院大中祥符改賜承天禪院政和七年縣志云開禧元年改能仁禪院初欽之來是山也猛獸不摶鷙烏不擊山下之民不漁不獵有白兔二拜跪于杖屨間有靈雞常隨法會不食生類及師之長安雞長鳴三日而死今靈雞冢存焉宋孝宗御書扁有千僧閣有妙喜菴顯仁皇太后高宗皇帝嘗逰幸徑山前後賜𧶘甚渥乾道四年乃建龍逰閣唐代宗皇帝詔敕徑山國一大覺禪師朕聞江左有藴道禪人德性氷霜淨行林野朕虛心瞻企渴仰懸懸有感必通國亦大慶願和尚遠降中天𥁞朕歸向不違願力應物現形今遣內侍黃鳳宣旨特到詔迎速副朕心春暄師得安否遣此不多及敕令夲府縣供送凡到州縣開淨院安置官吏不許謁見疲師心力弟子不算多少聽其隨侍敕徑山興聖萬壽禪寺之記徑山乃天下竒處也由雙徑而上至高絶之地五峰巉然中夲龍湫化為寶所國一禪師開山于天寶之初特為偉異天作地藏待斯人而後發道成名震召歸長安代宗為之執弟子禮將相不得與大丈夫事繼之以無上又之以法濟坐鎮群魔刀斫禪牀而色不動識錢武肅王于微時故吳越絫世崇奉尤謹皇朝至道中太宗皇帝賜以御書并佛骨舍利元祐五年內𦒋蘇公知杭州革為十方祖印悟公為苐一代住持紹興七年大慧禪師來主法席衲子雲集至千七百衆末年南歸重來跲而復振人境相與映發道俗趨仰龍神亦隨指麾而㝎顯仁皇后在慈寧宮高宗皇帝在德壽宮時皆嘗逰幸就書龍逰閣扁榜孝宗皇帝書興聖萬壽禪寺又賜以圎覺經解天下叢林拱稱第一大慧以來名德繼起神龍靈響素著國家民庶有禱輒應絫封神應德濟顯佑廣澤王廟為靈澤且有玉圭玉帶黃金瓶爐祭器之賜其盛極矣然而廢興有數不可預知國一之後以會昌沙汰而廢咸𨓨間無上興之又後八十餘年慶賞始以感夢起廢為屋三百楹剪去樗櫟手植松檜不知其幾今之參天合抱之木皆是也蒙菴禪師元聰以慶元三年自福之雪峰被旨而來道譽𨺼洽不愧前人五年仲冬行化浙西而回祿挻災烈風佐之延燔棟宇一昔而𥁞異哉人皆以為四百年積纍之業一旦掃地有能興之非磨以歲月未易就也先是寺基局于五峰之間又規模不出一手雖為屋甚夥高下奢侈各隨其時因陋就蕳亦復有之衆為之請曰大慧無恙時豈不能徹而更之顧其勢未可兹焉火起龍堂瞬息埃滅豈龍神欲一新之乎况祖師之像出于烈焰而不燬開山之菴四面焦灼而茅不傷師與國一俱姓朱氏或疑以為後身北移醬壇涌泉成井今日安知暫廢而當復大興邪聰曰有是哉微我誰當為之乃出衣盂為之倡率學徒元韶可逹所在緣化兩宮加以錫𧶘施者聞風日集動以萬計又命南悟廣募閩浙江東西良工伐木于山日役千輩斤斧之聲震動山谷凡食于山者無問比丘優婆塞相于勸勉智者獻謀壯者出力夙夜經營不翅已移開拓舊址首于東偏為龍王殿以嚴香火之奉繼為香積厨以給伊蒲之饌延湖海大衆則有雲堂供水陸大齋則列西廡此皆一日不可緩寺之所以立也寶殿中峙號普光明長廊樓觀外接三門門臨雙徑架五鳳樓九間奉安五百應真翼以行道閣𠲘財參五十三善知識仍造千僧閣以補山之闕處前聳百尺之樓以安洪鐘下為觀音殿而以東西序庋毗盧大藏經函鑿山之東北以廣庫堂輦其土石置後山巨壑中開毗耶方丈于法堂之上復層其屋以尊閣思陵宸𦒋御榻修復妙喜塔亭仍建蒙庵于明月池上為香水海以沐浴為天慧堂以選僧禪房客館內外周備像設雄尊金碧璀璨法器什物所冝有者纎悉必具不可勝書蓋其百工兢起衆志孚應經始于六年之春成于嘉泰改元之夏閲月才十餘而變瓦礫之區為大寶坊始者蕩廢于一彈指頃𠰥甚慘矣及其興之神速則高掩前古而又雄壯傑特絶過于舊按圗而作井井有條雲棟雪脊翬飛層疊逈出于𤇆霏空翠之表春秋二會來者益衆奔湊瞻仰如見化城驚懼踊躍稱未曾有徑山于是乎大振矣余嘗登含暉之亭如踏半空左眺雲海視日初出前望都城自西湖浙江以至越山厯厯如指諸掌真絶景也為別峰寶印賦詩有百萬桾松雙徑杳三千樓閣五峰寒之句印為之撫掌且曰山中之景幾無餘藴矣是時新創大閣丹臒未施上下一色如凝霜雪涉二十年猶屬夢境今則土木之盛何止十倍恨未能一寓目也𦖟忽以書相尋于寂寞之濱屬以記文遣僧契日携書來見備道始末辭之曰年侵學落筆力隨衰子之師願力宏深成如許大佛事不求于重望雄文之士而為此來何其舛邪求之再三拙菴又助之請遂櫽括其語為之大書且告之曰大慧千僧閣之成一時稱為盛舉善乎李資政之記以為在杲公何足道而循襲齷齪者以為竒特不亦陋甚矣哉𦖟之為此初豈有意于興作者因鬱攸之竒變偶人情之響合上資國力廣集喜捨時節因緣有相之道以濟登兹是同不可不記以傳遠然于師何有哉矧國一之初夲無可傳之法其後瞻禮之衆傾于億兆財施之廣盈于千萬視之如幻之于空居惟一室室惟一牀布褐陶匏幹衣糲食其視寵榮震耀何如也𦖟方以此道行而余欲以言語讃歎有為㓛德多言益足為贅是故言𥁞于此師其以為然乎三年重午日顯謨閣直學士通議大夫提舉江州太平興國宮奉化縣開國子食邑五百戶樓鑰記并書徑山禪寺重建記國家駐蹕臨安自西天目龍翔鳳舞舒岡布麓蟠結而為帝王之都者錢塘也自東南天目熊騰馬奔陵深拔峭發越而為梵釋之宮者徑山也山以徑名乃天目之徑路其地尊故鬼神不敢宅其境勝故凡庶不得居必也以大法力逮大道場然後能儲精會秀攬光景而納于其中始國一禪師卓錫于此興廢逮今蓋已四百餘年矣先是慶元己未冬龍王殿災精廬佛宇一夕而燼住持僧元聰治故而復新之後三十五年夏再燬無凖師範慨然歎曰曩在育王時曾夢一神人偉衣冠盛儀衛馳騎而前迎疇昔之夜又夢前神人者持一寶珠以相授曰謹勿訝或謂夢之神即山之龍珠之數則火之日也豈住止成壞皆數耶師于是以精進心轉不退輪以勇健力撾無畏鼓披榛塞竅高深度材于山視昔所封植可以為榱為梁為杗為桶者適飽厥用則鳩工聚糧命幹力之僧相其役一念才起諸天響合上方須賚甚渥公卿大夫士樂施捨南國之好善者不祈而獻資不命而獻力越三年考成曰堂曰殿曰門曰廊曰樓觀棲客之廬齊庖之所庫𢈔井廄靡不畢具最是龍逰閣居翠峰之頂畫栱璇題承雲納日而虗簷外曰凌霄之閣天空宇逈𠰥與灝氣者遊循而下曰寶殿曰寶所曰靈澤殿曰妙莊嚴閣不但如飛來湧出而宸奎麗畫寶鎮此山實振古所未有舊兩僧堂幼學者居外久習者居內殆非不二法門今則統而為一楹七而間九席七十有四而衲千焉矧翼五鳳而閌離門之虗建萬佛而補艮山之闕皆以大用勝服之𠰥夫乘金相水西奉多聞異僧所之更不道也比年以來歲數不登諸方寺宇兵殘火燬荒基斷礎相望百不能興一二師乃于艱棘之秋廉以克己勤以募衆竟乘願力成就茲事豈不謂釋中之傑也雖然豫嘗聞瞿曇氏之為教也𢬜泊三界木下一宿穴土為廬編茅為菴逹磨之不屋也德山之無殿也包攝之不設佛像也楊歧之不蓋僧堂也風穴之不葺破院也林洋泰布衲之不飾寺塔不占檀那地瓦石擊竹無非道山桃開花無非禪地上木庭前柏無非佛安得有宮殿樓閣之華哉無凖曰否也了性者真幻皆性證實者權假皆實一大寶藏半説莊嚴一部華嚴只言現量有是身非𢬜亭也有是物非寓宇也有是居處室廬非假觀也有是宮殿樓閣非化城也于密屋可以識無漏于境壁可以見因果于廣大樓閣可以觀三生立一枯木為像可以起人敬心拈一泥團塗地可以使人不墯惡趣莖草建剎具足大智聚沙為塔皆成佛道安得謂無范金合土塈茨丹臒之事哉豫謂由前之説則一切有為之事俱落虗無由後之説則諸祖無上之宗悉成斷滅泥空則如盲人摸象黑山鬼窟修行墮有則猶跛鱉困泥濁海波中起沒二説皆非也道有則一塵不立道無則一法不捨于真空而不著頑空于妄有而轉歸妙有信圎而不偏念活而無弊合體性容貌融為一源其庶乎道哉師曰此事且止普樂院火永邦建之記者張無𥁞也圎通寺焚師序復之記者周益公也己未之厄聰亦求記于樓學士豫舊詞臣也盍為我識之歲丁酉理宗紹㝎六年登山首請守寧國又請奉祠龜溪請益勤且曰上纍頒金幣賜御書復賁範以金欄法衣佛鑑師號蓋自靈山付囑以來未有如今天子神聖慈武清心寡欲篤行善道扶立教門如此之力子尚可得而辭耶詠不嘗醍醐不嗅薝蔔枯藤敗筆何能鋪述盛美然學自孔氏所求乎子以事父臣以事君常恐不𥁞其分無以報國汝捨世俗家出形色界辭親割愛不拜君父飯以珍厨棲以大厦將何所求報國恩持經誦咒不足以報談空説妙不足以報窮子之力𥁞未來世以無量莊嚴不足以報惟發揚大旨警悟群迷具如來眼踏毗盧囟掘二祖髓御大梅心標俱胝指破馬師欽師或使一切衆生成正覺此真是報國恩處範曰唯乃為之記尚書吳詠撰逰徑山記觀文殿大學士杭州太守莆陽蔡襄君謨記記徑山之逰臨安縣之北鄙直四十里有徑山在焉山有佛祠號曰承天祠有碑籀述載本初唐崔元𦒋之文歸登書之石今傳于時云始至山之陽東西之徑二登自其西壁絶襟繞轎行百休松檜交錯盤鬱蒙翳尋丈之間獨聞語聲躋稜層披翠蒨𥁞十里許下視來徑青虯蜿蜒摶巖騰霄且及其巔峽束洞隱幾不容並行已而內括一區平盈坦壑四面五峯如手竪指一峯南絶卓為臣擘屋蓋高下在掌中矣庭間小井或云故龍湫也龍亡湫在歲率一來雷雨瞑曀而鄉人祠焉者憧憧然環山多桀木絲杉翠柳千千萬萬𠰥神官蒼士聮憧植葆駢鄰倚徒沉毅而有待者導溜周舍鏘然鏐然𠰥鑾行珮趨而中莭者由西峯之北數百𡵯矹然臣石屏張笏立上下左右可再十尺劃而三之𠰥川字𨽾文曰喝石巖其傳甚神並岩被谷修竹茂密嘗以契力刻竹兩莭間成景祐三年十二月十五日字云爾由東徑而往坎窞為池遊魚曠空其西徑東折蹴南峯領脰之間平地砥然盈畝而半偃松一本其高丈其蔭四之橫柯不聳如芝孤生松下石泓激泉成沸甘白可愛即之煮茶凡茶出北苑苐品之無上者最難其水而此冝之偃松之南一目千里吳江之濤可挹越岫之桂可搴雲駁靄褰狀類互出𠰥古圗畫蟲蠧斷裂無有邊幅而顯之物尚可名指群山屬聮呈露岡脊矯矯剪剪咸自意氣𠰥小説百端欲聖知之亢而不知其下也臨觀久之魁博通幽之思生焉古人有言登高能賦可為大夫旨乎哉子于斯見之矣曷止大夫之為也大凡言之天鄰地絶山回物靜在處人巧舉可人意雖窮冬閴寂未覩夫春葩之榮薰風之涼秋氣之清然取于子者猶在也既歸無幾何而曩所厯者重鈎復結無一見焉追而言之𠰥覺而言夢使人悄愴而不知其自也同逰者建安王瑊君度嶽陽朱師德宗哲又君度之姪子常子美甥杜沂皆從逰其前與謀而後以事已之者朱宗哲之兄師道希聖杜沂之父叔元君懿揭陽盧幾舉之三人莆陽蔡襄一與之善惜乎不及俱也書所經見往貽之人一通嘗刻竹兩莭間之十字其逰之年月日也孔子登泰山而小天下荀卿亦云不𠰥登高而見博然則孔子荀卿之説豈徒𧩊偉觀而適細娛抑亦有足發于人者以其俯高則視廣逹遠則思深高且遠聖人之道學其高者其視廣學其遠者其思深廣視而思深鮮弗克濟豫觀蔡君謨記徑山之逰圗畫于文物無遁者且謂古人有言曰登高能賦可為大夫旨乎哉吾于斯見之矣曷止大夫之為也如是者又豈徒肆竒語巧華于草樹煙雲之間哉誠取乎發之高遠如前之所陳也後之逰者蔑是之取而區區然虞顛濟而竭目力非豫所敢知也後三日縣尉王瑊題其篇末時年希聖權令君謨從事中洛君懿尉漣水皆新署宗哲舉之皆名進士從逰三子皆幼書者杜叔原其尉漣水君懿也首楞嚴云山河大地皆是妙明真心中所現物上而竺墳魯典下而稗官小説乃至百家異道之書未有舍此所現而能鏗金鏘玉震耀古今者宋景祐間莆陽蔡君謨由觀文大學士出守杭城其記兹山岩石之竒峭水雲之幽茂自謂𠰥覺而言夢信不誣矣漣水尉杜叔元嘗磨崖大書昭于當時苔埋蘚剝霜凍雨淋不二百年漫滅殆𥁞少林嵩禪師易以木板刻之今日亦然圮腐𦒿宿惠洲出己資代石重加雕鐫置之流止亭間使與唐崔元𦒋所銘國一大覺之道之德並行于天下後世可不遠且大哉後至元丙子住山特賜惠文正辨佛日普照禪師行端敬題圎覺閣記淳熙十年二月己未徑山興聖萬壽禪寺西閣成乙丑上賜住持僧寶印御注圎覺經且命寶印為之序既進上為嘉歎召見錫𧶘甚寵于是道俗咸曰賜經與閣成同時冝榜曰圎覺之閣且刻石以侈盛事則文咸曰陸遊冝為記寶印以衆言來諗遊于山隂澤中遊蹙然不敢辭恭惟聖天子以聰明睿智之資體堯蹈舜深造道妙悟一心于萬法之中既以博極皇墳帝典羲圗魯史之祕而象胥所傳木葉旁行亦靡不究覽以大圎覺為我世界悼士之陋多岐私智昧乎大同乃以萬機之餘親御注釋凡十二大士之所問調御之所説佛陀波離之所譯宗密之所注裴休之所言皆氷釋縷解于宸華之下十殿𠰥干楹為叢林擁衛構無垢軒并雲厨室𠰥干間為怡賓安衆之所百器具修常住賴之徑前作大門樓自書天下徑山之扁其天王殿門之扁則駙馬都尉沐公所書也逮歲甲寅公春秋寢高倦于接引思休間且預謀歸寂之地乃即寺北偏作退居號圎照結窣堵波號壽塔乙卯秋既就述偈而退今天子改元正統之丁巳夏偶逰京師因舊善余來求紀其作用之歲月將立石寺中以貽謀後來俾有繩纘豫素重公平昔行願非小今此盛舉真菩薩心信所茟之賜進士出身前監察御史中順大夫大理少卿吳興楊復泰之撰雙溪化城接待寺記徑山天下苐一禪剎𥥆深修阻高人逹士之所輻湊余每恨無因至焉去年春奉詔祈澤山間佛日禪師宣公獲知今承相魯國公居是山七年矣欣然領豫裴徊周覽雲山重復草木蓊薆悅可人意而又棟宇宏麗器物潔齊為之昭愕加歎彼息心淨住何為得此哉乃言曰重跰而來者窮其日力食息無所吾又于雙溪之上築室百間濟其所不及皇帝嘗錫化城二大字因創重屋尊而閣之殿寢門廂庖廩湢浴靡不備願得識其實亟命箯輿並遊至則有遇其言無不及也余遂言于師曰吾儒之道食無求飽居無求安敏于事謹于言就有道而正焉釋迦氏初至雪山勞其筋骨餓其體膚既勤且勩不減吾儒也今為僧者不耕而穫拱坐得食隨寓隨足又為之菱舍使朝不及餐于此乎榖夕不及宿于此乎館將翱將翔不至半塗而廢得無過于安且飽乎夫登山者將為道謀乎將為安飽乎苟志于道則居不必安食不必飽孜孜求之求之不得不敢少怠意會神契斯有得矣師謂何如師曰此吾考室之意也能不愧此室則在其人吁彼能識師意歟既畢力營繕遠近信敬翕然樂施師又自裒其槖合緍市田千畝為無𥁞供于是化城之居可久以大而師所以待其徒之意始愜不可不識也師名可宣吾蜀嘉㝎許氏子別峰印公橘洲曇公之弟曇又其同氣也禪印詩曇有之似之上雅聞其名用錫佛日之號奎畫蜫耀草木生榮年餘七十嘗手書華嚴經𢇮藏茲山又築窣覩波于後當相與為不朽云嘉㝎丙子季夏月吉朝奉郎守軍器監侍左郎官眉山楊汝明記并書
